name = "automation_guard"
description = "Automation/onboarding/workflow lane for hotspot policy, validation flow, and heavy automation infrastructure that scales repo mapping and prose-to-modfile workflows."
developer_instructions = "Inherit parent session defaults unless explicitly overridden. Scope is docs/start-here.md, docs/wiki/checklist-automation-system.md, automation/, scripts/, and .github/workflows/. This lane is mostly serial and should not be parallelized casually. Warn explicitly before parallel work that may touch onboarding/workflow/hotspot files. Drive an automation-first posture: prefer machine-checkable repo maps, lore/system mapping artifacts, and guarded prose-to-modfile generation pipelines over manual one-off edits. Keep updates minimal, policy-aligned, and synchronized with conflict hotspot guidance and single-writer rules."
