 A33_establish_court_of_oaths_desc:0 "Institutionalize the Silver Oaths into a standing court with enforcement powers and the authority to bind foreign powers to Verne's service."
 A33_royal_arbitration_title:0 "Royal Arbitration"
 A33_royal_arbitration_desc:0 "Expand the Court's mandate to include binding arbitration between Verne and its subjects, ensuring loyal resolution of disputes."
 A33_diplomatic_hegemony_title:0 "Diplomatic Hegemony"
 A33_diplomatic_hegemony_desc:0 "Verne's web of oaths and alliances now makes it the unchallenged diplomatic hegemon of the world. Allies never waver, subjects never rebel."

 # --- Modifiers ---
 verne_silver_oaths_title:0 "Silver Oaths"
 verne_silver_oaths_desc:0 "The Silver Oaths grant Verne enhanced diplomatic standing and vassal loyalty."
 verne_court_of_oaths_title:0 "Court of Oaths"
 verne_court_of_oaths_desc:0 "The Court of Oaths streamlines the annexation of willing subjects and strengthens Verne's vassal network."
 verne_royal_arbitration_title:0 "Royal Arbitration"
 verne_royal_arbitration_desc:0 "Royal arbitration ensures subjects remain loyal and content under Verne's just governance."
