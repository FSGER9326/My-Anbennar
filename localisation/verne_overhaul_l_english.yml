 verne_doctrine_pearlescent_concord_princes_word_desc:0 "When the prince's word carries enough prestige, integration and annexation become easier to secure."

 # ============================================================
 # DOCTRINE IDEAS — APOSTOLIC VALOUR
 # ============================================================

 verne_doctrine_apostolic_valour:0 "Apostolic Valour Ideas"
 verne_doctrine_apostolic_valour_desc:0 "Corinite militancy and righteous imperial war are transformed into a disciplined doctrine of devotion in battle."
 verne_doctrine_apostolic_valour_bannered_devotion:0 "Bannered Devotion"
 verne_doctrine_apostolic_valour_bannered_devotion_desc:0 "The army carries its devotion into battle and makes prestige out of public piety under arms."
 verne_doctrine_apostolic_valour_march_sermons:0 "March Sermons"
 verne_doctrine_apostolic_valour_march_sermons_desc:0 "Preaching becomes part of the army's campaigning discipline, sustaining morale and conversion alike."
 verne_doctrine_apostolic_valour_sacred_drill:0 "Sacred Drill"
 verne_doctrine_apostolic_valour_sacred_drill_desc:0 "Drill and devotion are treated as complements rather than rivals in the imperial army."
 verne_doctrine_apostolic_valour_righteous_charges:0 "Righteous Charges"
 verne_doctrine_apostolic_valour_righteous_charges_desc:0 "The army is taught that righteous shock can be a statecraft of its own."
 verne_doctrine_apostolic_valour_commanderies:0 "Commanderies of Valour"
 verne_doctrine_apostolic_valour_commanderies_desc:0 "Militant commanderies institutionalize piety and prestige as tools of permanent war-readiness."
 verne_doctrine_apostolic_valour_emperors_sword:0 "The Emperor's Sword"
 verne_doctrine_apostolic_valour_emperors_sword_desc:0 "The ruler's sword becomes an article of state devotion and a source of military endurance."

 # ============================================================
 # DOCTRINE IDEAS — SILVER BANNER
 # ============================================================

 verne_doctrine_silver_banner:0 "Silver Banner Ideas"
 verne_doctrine_silver_banner_desc:0 "Compact elite force, court discipline, and professional military excellence are fused into a doctrine of silver-bannered dominance."
 verne_doctrine_silver_banner_drillmasters:0 "Ducal Drillmasters"
 verne_doctrine_silver_banner_drillmasters_desc:0 "The ducal state elevates drill and professionalism into one of its defining military arts."
 verne_doctrine_silver_banner_parade_standards:0 "Parade Ground Standards"
 verne_doctrine_silver_banner_parade_standards_desc:0 "Ceremony is turned into practical military rigor when parade standards become field expectations."
 verne_doctrine_silver_banner_veteran_cadres:0 "Veteran Cadres"
 verne_doctrine_silver_banner_veteran_cadres_desc:0 "The Silver Banner favors a hard core of veteran infantry that anchors the whole field army."
 verne_doctrine_silver_banner_chosen_captains:0 "Chosen Captains"
 verne_doctrine_silver_banner_chosen_captains_desc:0 "Verne's finest captains are selected to lead a narrower, harder elite war machine."
 verne_doctrine_silver_banner_silver_line:0 "The Silver Line"
 verne_doctrine_silver_banner_silver_line_desc:0 "The line itself becomes a prestige-bearing institution of disciplined force and organized mass."
 verne_doctrine_silver_banner_reserve_companies:0 "Imperial Reserve Companies"
 verne_doctrine_silver_banner_reserve_companies_desc:0 "Reserve companies are drilled and replenished fast enough to sustain elite warfare over the long term."

 # ============================================================
 # DOCTRINE POLICIES (v0.3)
 # ============================================================

 verne_silver_wake_oath_harbormasters_act:0 "Act of the Oathbound Harbormasters"
 verne_silver_wake_oath_harbormasters_act_desc:0 "Silver Wake discipline paired with the Court of Silver Oaths creates a harbor administration that is both trusted abroad and orderly at home."
 verne_silver_wake_captains_charter_act:0 "Captains' Charter Act"
 verne_silver_wake_captains_charter_act_desc:0 "Where the Silver Wake and the Charter of Great Captains meet, Verne rewards practical convoy leadership, disciplined commerce, and steady seamanship."
 verne_silver_wake_ducal_convoy_ordinance_act:0 "Ducal Convoy Ordinance"
 verne_silver_wake_ducal_convoy_ordinance_act_desc:0 "Armoc's muster traditions are applied to convoy security, producing a fleet-backed state that recovers manpower reliably and hardens its key strongpoints."
 verne_silver_wake_quayside_discipline_act:0 "Quayside Discipline Act"
 verne_silver_wake_quayside_discipline_act_desc:0 "This general Silver Wake statute extends dockside discipline across the realm, reducing unrest and keeping sailor administration from slipping into wasteful disorder."
 verne_articles_of_the_silver_admiralty:0 "Articles of the Silver Admiralty"
 verne_articles_of_the_silver_admiralty_desc:0 "Silver Oaths statecraft and the Imperial Sea Court together produce a disciplined maritime code of legitimacy, fleet poise, and naval authority."
 verne_charter_of_overseas_audiences:0 "Charter of Overseas Audiences"
 verne_charter_of_overseas_audiences_desc:0 "Courtly diplomacy and Vernissage projection combine to speed contact abroad and improve Verne's standing in distant halls."
 verne_ordinance_of_noble_service:0 "Ordinance of Noble Service"
 verne_ordinance_of_noble_service_desc:0 "Silver Oaths administration and Dragonwake martial custom are fused into a service code that honors noble arms while strengthening dynastic legitimacy."
 verne_heartspier_shipping_code:0 "Heartspier Shipping Code"
 verne_heartspier_shipping_code_desc:0 "Port-finance discipline and Regatta seamanship combine into a shipping code that sharpens light-ship performance and maritime commerce."
 verne_convoys_of_state:0 "Convoys of State"
 verne_convoys_of_state_desc:0 "The sea court and Heartspier's companies together transform convoys into instruments of both commerce and state prestige."
 verne_accords_of_the_eastern_princes:0 "Accords of the Eastern Princes"
 verne_accords_of_the_eastern_princes_desc:0 "Vernissage prestige and eastern correspondence join into a diplomatic network that extends Verne's reach and authority abroad."
 verne_regatta_of_distant_harbours:0 "Regatta of Distant Harbours"
 verne_regatta_of_distant_harbours_desc:0 "The Vernissage and the Grand Regatta together turn world-facing maritime display into faster fleets and deeper sailor culture."
 verne_articles_of_remote_command:0 "Articles of Remote Command"
 verne_articles_of_remote_command_desc:0 "Overseas commandery doctrine and Vernissage projection produce a stronger legal and logistical framework for distant rule."
 verne_capitular_articles_of_the_wake:0 "Capitular Articles of the Wake"
 verne_capitular_articles_of_the_wake_desc:0 "Dragonwake nobility and the Crimson Wake orders together produce a harsher mounted service tradition built on commanderies, subsidies, and elite riders."
 verne_storm_crowned_doctrine:0 "Storm-Crowned Doctrine"
 verne_storm_crowned_doctrine_desc:0 "Dragonwake aristocracy and battle-evocation merge into a harsher doctrine of shock leadership and war-mage command."
 verne_sea_nest_command_statutes:0 "Sea-Nest Command Statutes"
 verne_sea_nest_command_statutes_desc:0 "The Crimson Wake and the Sea-Lance schools together codify a doctrine of faster maritime coordination and expeditionary movement."
 verne_protocols_of_controlled_devastation:0 "Protocols of Controlled Devastation"
 verne_protocols_of_controlled_devastation_desc:0 "Red Court statecraft and battle-evocation discipline combine into a doctrine of highly managed, highly destructive magical war."
 verne_foundry_war_ordinances:0 "Foundry War Ordinances"
 verne_foundry_war_ordinances_desc:0 "The Khenak foundry-state and the Red Brass doctrine are bound together into a centralized artillery war machine."
 verne_audit_of_chartered_harbours:0 "Audit of Chartered Harbours"
 verne_audit_of_chartered_harbours_desc:0 "Imperial chancery discipline and estuary-company bookkeeping combine into a harder, cleaner maritime fiscal machine."
 verne_concord_of_seals_and_oaths:0 "Concord of Seals and Oaths"
 verne_concord_of_seals_and_oaths_desc:0 "Chancery seals and pearlescent concord together make annexation smoother and subject politics steadier."
 verne_pilgrim_convoy_articles:0 "Pilgrim Convoy Articles"
 verne_pilgrim_convoy_articles_desc:0 "Corinite stewardship and apostolic sea-lanes combine to carry both faith and morale over sea routes."
 verne_capitular_ordinance_of_corin:0 "Capitular Ordinance of Corin"
 verne_capitular_ordinance_of_corin_desc:0 "Corinite state order and apostolic valour are joined into a stern military ordinance of faith and legitimacy."
 verne_articles_of_the_silver_line:0 "Articles of the Silver Line"
 verne_articles_of_the_silver_line_desc:0 "Dragonwake prestige and Silver Banner professionalism combine into a harder elite military tradition for Verne's chosen line."
 verne_compact_of_harbours_and_halls:0 "Compact of Harbours and Halls"
 verne_compact_of_harbours_and_halls_desc:0 "The disciplined harbor world of the Silver Wake and the managed patronage of the Red Court are reconciled into a more serviceable state compact."
 verne_charter_of_expeditionary_foundries:0 "Charter of Expeditionary Foundries"
 verne_charter_of_expeditionary_foundries_desc:0 "Verne's overseas command structures and Khenak industrial system are bound together, enabling more mobile and practical expeditionary war-making."
 verne_settlement_of_the_reforged_court:0 "Settlement of the Reforged Court"
 verne_settlement_of_the_reforged_court_desc:0 "A post-scandal accommodation between chancery order and Red Court ambition gives the realm a steadier, more legitimate institutional machine."

 # ============================================================
 # ADVENTURE NETWORK MISSIONS (Lane 6 Legacy)
 # ============================================================

 A33_charter_the_expedition_fleet_title:0 "Charter the Expedition Fleet"
 A33_charter_the_expedition_fleet_desc:0 "If Verne is to become the home of adventurers, we must make voyages routine: sailors, supply, and the institutional capacity to go again."
 A33_ports_of_adventure_program_title:0 "Ports of Adventure Program"
 A33_ports_of_adventure_program_desc:0 "A true network is not one daring voyage — it is a web of harbors, guild charters, and reliable staging points."
 A33_expedition_supply_chain_title:0 "Expedition Supply Chain"
 A33_expedition_supply_chain_desc:0 "Verne's adventurers need more than brave hearts — they need merchants, contracts, and steady logistical support to sustain overseas operations."

 # ============================================================
 # INDUSTRIAL FOUNDRY MISSIONS (Lane 9)
 # ============================================================

 A33_red_brass_forge_title:0 "The Red Brass Forge"
 A33_red_brass_forge_desc:0 "The Khenak foundries now produce more than tools and wares. The Red Brass Forge turns Verne's industrial muscle into a weapon of war — artillery, ordnance, and the metallurgical science that sustains it."
 A33_controlled_devastation_title:0 "Protocols of Controlled Devastation"
 A33_controlled_devastation_desc:0 "Verne's industrial output has matured into a doctrine of controlled devastation: precise, disciplined, and overwhelmingly destructive. The Silver Court now wages war with foundry logic."

 # ============================================================
 # VERNISSAGE SECRETARIAT MISSION (Lane 7)
 # ============================================================

 A33_vernissage_secretariat_title:0 "The Vernissage Secretariat"
 A33_vernissage_secretariat_desc:0 "The Vernissage has grown beyond a gallery of wonders — it is now an engine of state prestige, a center of foreign exchange, and the administrative heart of Verne's cultural diplomacy."

