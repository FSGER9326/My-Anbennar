# === NEW MISSIONS: LANE 7 MILITARY ORDERS ===
verne_found_the_crimson_scale_order:0 "Found the Crimson Scale Order"
verne_found_the_crimson_scale_order_desc:0 "The Knights of the Crimson Scale are forged in the fires of Verne's military tradition, carrying the banner of Corin across the world."
verne_found_crimson_scale_order_tt:0 "Establishes the Crimson Scale military order. Crimson Wake Lances mercenary company gains permanent activation."

# === NEW MISSIONS: LANE 8 FAITH ===
verne_corinite_stewardship:0 "Corinite Stewardship"
verne_corinite_stewardship_desc:0 "Verne takes up the mantle of Corinite stewardship, protecting the faithful and spreading the light of the Silver Order across Halann."
verne_corinite_stewardship_effect_tt:0 "Grants permanent missionary strength and religious unity bonuses."

verne_world_faith_emperor_desc:0 "The World Faith Emperor's mandate extends Verne's religious authority to every corner of the known world. Corinite is not merely a faith of the Empire -- it is the faith of the world."
verne_world_faith_emperor_tt:0 "Grants permanent diplomatic reputation and global missionary strength."

