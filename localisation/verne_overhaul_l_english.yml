l_english:
 # ===============================================
 # Verne overhaul reusable layer
 # Ownership: Verne overhaul reusable layer (v0.1)
 # Scope: dedicated localization namespace for overhaul helpers/modifiers
 # ===============================================

 # --- v0.1 reusable modifiers ---
 verne_adventure_projection_foothold:0 "Adventure Projection Foothold"
 verne_adventure_projection_foothold_desc:0 "The court has committed resources to secure an early Vernman foothold abroad."

 verne_adventure_projection_network:0 "Adventure Projection Network"
 verne_adventure_projection_network_desc:0 "Our maritime-adventure web is now organized as a reusable strategic network."

 verne_reward_old_friends_old_rivals:0 "Old Friends, Old Rivals"
 verne_reward_old_friends_old_rivals_desc:0 "This reward package anchors early diplomatic and trade momentum in the Verne overhaul flow."

 verne_dynasty_protected_court:0 "Dynasty-Protected Court"
 verne_dynasty_protected_court_desc:0 "Court protocol and succession planning are actively safeguarding the Verne line."

 verne_dynasty_exalted_lineage:0 "Exalted Verne Lineage"
 verne_dynasty_exalted_lineage_desc:0 "The ruling line has entered a consolidated exalted phase with stronger central authority."

 verne_marriage_court_protocol:0 "Marriage Court Protocol"
 verne_marriage_court_protocol_desc:0 "Formalized marriage-court institutions improve dynastic continuity and diplomatic positioning."

 verne_tarnished_courtly_reputation:0 "Tarnished Courtly Reputation"
 verne_tarnished_courtly_reputation_desc:0 "Court scandals weaken confidence in state discipline and raise governance friction."

 verne_fading_ducal_authority:0 "Fading Ducal Authority"
 verne_fading_ducal_authority_desc:0 "Ducal authority is visibly weakening, emboldening challengers across the realm."

 verne_empty_boasts_of_the_wake:0 "Empty Boasts of the Wake"
 verne_empty_boasts_of_the_wake_desc:0 "Grand maritime rhetoric outpaces practical readiness, undermining naval confidence."

 # --- Overhaul helper-facing tooltip namespace stubs ---
 verne_overhaul_tt_unlock_network_of_adventure:0 "Unlocks the reusable §YNetwork of Adventure§! helper state and related expansion tools."
 verne_overhaul_tt_unlock_sarhali_adventures:0 "Unlocks Sarhali §YAdventures§! for the overhaul mission flow."
 verne_overhaul_tt_port_of_adventure_button:0 "Enables the overhaul-facing §YPort of Adventure§! province action in valid coastal centers of trade."
 verne_overhaul_tt_port_of_adventure_button_effect:0 "Sends §Y100§! colonists to establish a frontier foothold in a random province of the selected region."
 verne_overhaul_tt_needs_6_ports_of_adventure:0 "Requires §Y6§! total Ports of Adventure in the active network."
 verne_overhaul_tt_needs_11_ports_of_adventure:0 "Requires §Y11§! total Ports of Adventure in the active network."
 verne_overhaul_tt_needs_20_ports_of_adventure:0 "Requires §Y20§! total Ports of Adventure in the active network."
 verne_overhaul_tt_in_search_akasik_or_projection:0 "Either clear §YAkasik§! of Gnollish rule, project influence there via a §Ysubject/ally§!, or prove sustained reach through your §Yadventure network/monuments§!."
 verne_overhaul_tt_in_search_expedition_capacity:0 "Field expedition capability through classic §YColonizer+Explorer§! staffing, §Ysubject/ally projection§!, or an established §Ynetwork/monument§! route."

 verne_overhaul_tt_seed_silver_oaths:0 "Seeds the §YSilver Oaths§! path and establishes Verne's first reform foundation."
 verne_overhaul_tt_seed_khenak_foundry:0 "Seeds the §YKhenak Foundry§! industrial path for later Verne overhaul content."
 verne_overhaul_tt_seed_dragonwake:0 "Seeds the §YDragonwake§! martial-dynastic path for later Verne overhaul content."
 verne_overhaul_tt_activate_dynasty_protection:0 "Activates the first durable §Ydynasty protection§! state for the Verne overhaul."
 verne_overhaul_tt_activate_marriage_court:0 "Activates the §YMarriage Court§! support state for later dynastic progression."
 verne_overhaul_tt_seed_estuary_companies:0 "Seeds the §YEstuary Companies§! maritime-finance path for the Verne overhaul."

 verne_overhaul_formalize_silver_oaths:0 "Formalize the Silver Oaths"
 verne_overhaul_formalize_silver_oaths_desc:0 "By formally codifying the Silver Oaths, Verne anchors its first reform foundation in dynastic legitimacy, court discipline, and practical statecraft."

 verne_overhaul_open_marriage_court:0 "Open the Marriage Court"
 verne_overhaul_open_marriage_court_desc:0 "With the first reform foundation secured, the ducal court can now turn toward managed marriages, line continuity, and a more deliberate dynastic machine."

 # --- v0.1 doctrine + reform prototypes ---
 verne_proto_doctrine_ideas:0 "Verne Prototype Doctrine"
 verne_proto_doctrine_ideas_desc:0 "A cautious first doctrine draft used to validate overhaul wiring before wider doctrine rollout."

 verne_proto_doctrine_charter:0 "Prototype Doctrine Charter"
 verne_proto_doctrine_charter_desc:0 "Court-backed chartering practices give Verne a stable baseline for early doctrine experimentation."

 verne_court_of_silver_oaths_reform:0 "Court of Silver Oaths"
 verne_court_of_silver_oaths_reform_desc:0 "A disciplined oath-court binds dynastic legitimacy, diplomatic trust, and orderly administration into Verne's first true state foundation."

 verne_charter_of_great_captains_reform:0 "Charter of Great Captains"
 verne_charter_of_great_captains_reform_desc:0 "The ducal charter raises proven captains into a formal state estate, blending expeditionary prestige, frontier initiative, and practical command."

 verne_ducal_muster_of_armoc_reform:0 "Ducal Muster of Armoc"
 verne_ducal_muster_of_armoc_reform_desc:0 "Armoc's muster tradition turns noble military identity into a disciplined ducal war machine built around recovery, prestige, and mounted force."

 verne_admiralty_of_the_crimson_wake_reform:0 "Admiralty of the Crimson Wake"
 verne_admiralty_of_the_crimson_wake_reform_desc:0 "Verne's sea-state is entrusted to a disciplined admirality that binds convoy command, trade projection, and fleet confidence into a single maritime doctrine of rule."

 verne_estuary_companies_of_heartspier_reform:0 "Estuary Companies of Heartspier"
 verne_estuary_companies_of_heartspier_reform_desc:0 "Heartspier's estuarine financiers and port companies turn maritime administration into commercial leverage, cheaper building, and steadier credit."

 verne_regatta_discipline_reform:0 "Regatta Discipline"
 verne_regatta_discipline_reform_desc:0 "The Regatta becomes more than prestige spectacle: it codifies sailor culture, maritime readiness, and practical seamanship across the Vernman coast."

 verne_red_court_arcana_reform:0 "Red Court Arcana"
 verne_red_court_arcana_reform_desc:0 "The Red Court is formalized as a state-bearing institution, integrating mage influence, advisor depth, and dynastic shaping into the machinery of rule."

 verne_dragonwake_ordinance_reform:0 "Dragonwake Ordinance"
 verne_dragonwake_ordinance_reform_desc:0 "Wyvern service and martial dynastic training are codified into an ordinance that prizes shock leadership, officer tradition, and battlefield discipline."

 verne_battle_mage_collegium_reform:0 "Battle-Mage Collegium"
 verne_battle_mage_collegium_reform_desc:0 "Evocation doctrine and officer training are fused into a single war-collegium, giving Verne a harder striking field army and a deeper mage-officer bench."

 verne_charter_of_the_vernissage_reform:0 "Charter of the Vernissage"
 verne_charter_of_the_vernissage_reform_desc:0 "The Vernissage is elevated into a state-bearing court institution, turning magnificence, administration, and prestige into a deliberate machine of rule."

 verne_hall_of_distant_horizons_reform:0 "Hall of Distant Horizons"
 verne_hall_of_distant_horizons_reform_desc:0 "Verne's overseas doctrine is formalized around long-range movement, diplomatic reach, and practical infrastructure for sustained projection abroad."

 verne_vernissage_secretariat_reform:0 "Vernissage Secretariat"
 verne_vernissage_secretariat_reform_desc:0 "What began as spectacle becomes bureaucracy: a secretariat of exhibitions, correspondence, and worldly administration that binds prestige to practical governance."

 verne_wyvern_marshalate_reform:0 "Wyvern Marshalate"
 verne_wyvern_marshalate_reform_desc:0 "The wyvern-rider corps is raised into a true marshalate, organizing noble riders, officer tradition, and disciplined reinforcement under ducal authority."

 verne_crimson_eyrie_commandery_reform:0 "Crimson Eyrie Commandery"
 verne_crimson_eyrie_commandery_reform_desc:0 "Verne's wyvern infrastructure and martial orders are folded into a commandery system that lowers upkeep and expands state-directed mounted force."

 verne_sea_nest_ascendancy_reform:0 "Sea-Nest Ascendancy"
 verne_sea_nest_ascendancy_reform_desc:0 "Wyvern doctrine and sea power are fused into an expeditionary air-sea state, emphasizing maneuver, fleet reach, and fast-strike projection."

 verne_secretariat_of_the_grand_regatta_reform:0 "Secretariat of the Grand Regatta"
 verne_secretariat_of_the_grand_regatta_reform_desc:0 "The Grand Regatta becomes an institution of maritime reputation, commercial coordination, and world-facing logistics rather than merely a display of splendor."

 verne_imperial_sea_court_reform:0 "Imperial Sea Court"
 verne_imperial_sea_court_reform_desc:0 "Verne's diplomatic and naval prestige are fused into an imperial sea court that projects legitimacy abroad as reliably as fleets project force."

 verne_overseas_commanderies_reform:0 "Overseas Commanderies"
 verne_overseas_commanderies_reform_desc:0 "Strategic enclaves abroad are formalized into commanderies, giving Verne a more durable subject-and-enclave model for overseas power."

 verne_apostolic_court_of_corin_reform:0 "Apostolic Court of Corin"
 verne_apostolic_court_of_corin_reform_desc:0 "The Verne court becomes an apostolic institution of Corinite rule, blending missionary strength, diplomatic authority, and religious enforcement."

 verne_vernman_court_of_the_world_reform:0 "Vernman Court of the World"
 verne_vernman_court_of_the_world_reform_desc:0 "Prestige, commerce, diplomacy, and worldly attraction are drawn into one great cosmopolitan court that seeks to make Verne the center of Halann's gaze."

 verne_knights_of_the_crimson_scale_reform:0 "Knights of the Crimson Scale"
 verne_knights_of_the_crimson_scale_reform_desc:0 "Corinite militancy and knightly tradition are reorganized into an order-minded state arm that joins piety, warlike prestige, and disciplined service."

 verne_throne_of_the_wyvern_kings_reform:0 "Throne of the Wyvern-Kings"
 verne_throne_of_the_wyvern_kings_reform_desc:0 "Verne's final dynastic synthesis crowns military excellence, naval confidence, and war-mage kingship in a single supreme throne-state."

 verne_the_crimson_world_order_reform:0 "The Crimson World-Order"
 verne_the_crimson_world_order_reform_desc:0 "Global commerce, imperial administration, and diplomatic reach are fused into a singular world-order centered on Verne's maritime empire."

 verne_storm_crowned_hegemony_reform:0 "Storm-Crowned Hegemony"
 verne_storm_crowned_hegemony_reform_desc:0 "This final hegemonic form exalts Verne as a storm-crowned military and oceanic power, joining land supremacy with fleet-borne dominion."

 # --- Verne overhaul advisor layer ---
 verne_harbormaster_of_the_silver_wake:0 "Harbormaster of the Silver Wake"
 verne_harbormaster_of_the_silver_wake_desc:0 "A senior harbour administrator of the Silver Wake tradition, equally concerned with ledgers, pilots, convoy discipline, and the political theater of maritime trust."

 verne_curator_of_the_vernissage:0 "Curator of the Vernissage"
 verne_curator_of_the_vernissage_desc:0 "This courtly organizer shapes exhibitions, audiences, and diplomatic encounters into instruments of prestige and statecraft."

 verne_master_of_the_khenak_foundries:0 "Master of the Khenak Foundries"
 verne_master_of_the_khenak_foundries_desc:0 "A hard practical mind of furnaces, powder, and iron accounts, charged with turning foundry discipline into state strength."

 verne_magister_of_the_red_court:0 "Magister of the Red Court"
 verne_magister_of_the_red_court_desc:0 "A senior Red Court official who binds arcane administration, dynastic cultivation, and court procedure into one scarlet machine."

 verne_wyvern_marshal:0 "Wyvern Marshal"
 verne_wyvern_marshal_desc:0 "Part knight-captain, part ducal war planner, the Wyvern Marshal stands at the meeting point of noble service, aerial doctrine, and battlefield prestige."

 verne_overhaul_appoint_court_advisor:0 "Appoint a Court Specialist"
 verne_overhaul_appoint_court_advisor_desc:0 "Verne's growing institutions can now call a specialized court figure into service, drawing on the active lane that the realm has cultivated most successfully."
 verne_overhaul_appoint_court_advisor_tt:0 "A dedicated Verne court event will offer one of several bespoke advisors tied to your currently developed state lanes."

 verne_overhaul_advisor.1.t:0 "A Specialist for the Ducal Court"
 verne_overhaul_advisor.1.d:0 "The institutions now growing around the Vernman court have matured enough to present real specialists for ducal service. Whether we lean toward harbor discipline, worldly display, red-court administration, foundry rigor, or wyvern command, one of these figures could give the state sharper shape."
 verne_overhaul_advisor.1.a:0 "Summon a Harbormaster of the Silver Wake"
 verne_overhaul_advisor.1.b:0 "Invite a Curator of the Vernissage"
 verne_overhaul_advisor.1.c:0 "Commission a Master of the Khenak Foundries"
 verne_overhaul_advisor.1.d:0 "Raise up a Wyvern Marshal"
 verne_overhaul_advisor.1.e:0 "Appoint a Magister of the Red Court"

 merc_crimson_wake_lances:0 "Crimson Wake Lances"
 merc_crimson_wake_lances_mercenary_desc:0 "An order-host of crimson-bannered Vernman lancers, formed around Corinite martial patronage and disciplined aerial cavalry doctrine. They fight as a prestige arm of the realm's militant devotional state."
 merc_heartspier_skyguard:0 "Heartspier Skyguard"
 merc_heartspier_skyguard_mercenary_desc:0 "Drawn from veteran wyvernrider cadres and harbor-watch command, the Heartspier Skyguard serve as Verne's fast-striking elite, equally suited to guarding the gulf and breaking an enemy line."
 merc_khenak_talons:0 "Khenak Talons"
 merc_khenak_talons_mercenary_desc:0 "These expedition-forged companies marry Khenak's harder campaigning culture with Vernman mobility, fielding a practical composite force of riders, gunners, and seasoned march officers."

 verne_overhaul_charter_khenak_talons:0 "Charter the Khenak Talons"
 verne_overhaul_charter_khenak_talons_desc:0 "The Sarhali and foundry-facing arms of Verne can be formalized into a dedicated expedition company, giving the crown a harder, more practical force for its overseas and frontier wars."
 verne_overhaul_charter_khenak_talons_tt:0 "Unlock the Khenak Talons as a Verne-exclusive mercenary company and immediately make them available for service."

 verne_overhaul_crisis.1.t:0 "The Red Court Scandal"
 verne_overhaul_crisis.1.d:0 "Whispers of mismanaged dynastic patronage, factional court favor, and Silver Wake resentment now spill into the open. Verne's statecraft has grown ambitious enough that its failures can no longer be hidden behind ceremony."
 verne_overhaul_crisis.1.a:0 "The court reels under the blow"
 verne_overhaul_crisis.2.t:0 "A Question of Succession and Oaths"
 verne_overhaul_crisis.2.d:0 "Critics of the Red Court now question whether the dynasty's magical and marital machinery truly serves the realm, or merely shields the court from its own errors."
 verne_overhaul_crisis.2.a:0 "Let the accusations spread"
 verne_overhaul_crisis.2.b:0 "Reassert dynastic discipline"
 verne_overhaul_crisis.3.t:0 "Fractures in the Vernman Compact"
 verne_overhaul_crisis.3.d:0 "Merchants, captains, and noble households now demand visible concessions. Without a more ordered settlement, Verne's authority may curdle into a lasting crisis of reputation."
 verne_overhaul_crisis.3.a:0 "Endure the diplomatic embarrassment"
 verne_overhaul_crisis.3.b:0 "Buy time and formalize the court"
 verne_overhaul_crisis.100.t:0 "The Court Stabilized"
 verne_overhaul_crisis.100.d:0 "The worst of the scandal has passed. Verne's court remains ambitious and dangerous, but it has emerged more disciplined, more explicit, and better prepared to bear the weight of its own institutions."
 verne_overhaul_crisis.100.a:0 "The realm endures"

 # --- v0.2 verne doctrine group: silver wake ---
 verne_doctrine_silver_wake:0 "Doctrine of the Silver Wake"
 verne_doctrine_silver_wake_desc:0 "This doctrine binds Verne's ducal court, captains, and quayside guilds into one practical maritime system: account carefully, sail consistently, arbitrate quickly, and profit without overstraining the realm."

 verne_doctrine_silver_wake_start:0 "Foundations of the Silver Wake"
 verne_doctrine_silver_wake_start_desc:0 "Our first duty is to keep dependable crews at sea in every season, so that doctrine remains a daily practice rather than a ceremonial boast."

 verne_doctrine_silver_wake_bonus:0 "Silver Wake Finisher"
 verne_doctrine_silver_wake_bonus_desc:0 "By unifying crown ledgers and captaincy custom, Verne can move goods more efficiently across every established route."

 verne_doctrine_silver_wake_harbor_ledgers:0 "Harbor Ledgers"
 verne_doctrine_silver_wake_harbor_ledgers_desc:0 "Standardized port ledgers reduce leakages and help ducal tax officers track maritime revenue with fewer disputes."

 verne_doctrine_silver_wake_tide_charts:0 "Tide Charts of Verne"
 verne_doctrine_silver_wake_tide_charts_desc:0 "Shared coastal charting routines let each new generation of officers inherit practical seamanship rather than relearn it."

 verne_doctrine_silver_wake_marine_rotations:0 "Marine Rotations"
 verne_doctrine_silver_wake_marine_rotations_desc:0 "Crew rotations and dockside rationing plans lower long-term upkeep strain on the fleet payroll."

 verne_doctrine_silver_wake_convoy_discipline:0 "Convoy Discipline"
 verne_doctrine_silver_wake_convoy_discipline_desc:0 "Procurement rules and common hull standards make escort squadrons cheaper to field and easier to replace."

 verne_doctrine_silver_wake_prize_law:0 "Prize Law Codex"
 verne_doctrine_silver_wake_prize_law_desc:0 "A clearer legal path for captured ships encourages captains to seize enemy vessels intact whenever possible."

 verne_doctrine_silver_wake_captains_compact:0 "Captains' Compact"
 verne_doctrine_silver_wake_captains_compact_desc:0 "Recognized captaincy privileges create a disciplined officer corps that foreign courts increasingly trust."

 verne_doctrine_silver_wake_quayside_arbitration:0 "Quayside Arbitration"
 verne_doctrine_silver_wake_quayside_arbitration_desc:0 "Fast harbor arbitration settles merchant conflicts before they spill into wider unrest at home."

 verne_doctrine_vernissage:0 "Vernissage Ideas"
 verne_doctrine_vernissage_desc:0 "Adventure, courtly display, and overseas projection are woven together into a prestige-state doctrine of discovery, spectacle, and contact."
 verne_doctrine_vernissage_captains:0 "Captains of the Vernissage"
 verne_doctrine_vernissage_captains_desc:0 "The Vernissage sponsors a culture of prestige expeditions led by captains who turn court patronage into real overseas reach."
 verne_doctrine_vernissage_ports_of_adventure:0 "Ports of Adventure"
 verne_doctrine_vernissage_ports_of_adventure_desc:0 "A network of adventure ports and expedition harbours accelerates Vernman communications abroad."
 verne_doctrine_vernissage_heartspier_scale:0 "The Heartspier Scale"
 verne_doctrine_vernissage_heartspier_scale_desc:0 "Heartspier's prestige gives Verne a stronger hand in negotiations and curated displays of worldly power."
 verne_doctrine_vernissage_eastern_princes:0 "Eastern Princes' Correspondence"
 verne_doctrine_vernissage_eastern_princes_desc:0 "Letters, exhibitions, and princely exchanges turn prestige into long-distance political leverage."
 verne_doctrine_vernissage_expedition_ledgers:0 "Expedition Ledgers"
 verne_doctrine_vernissage_expedition_ledgers_desc:0 "Systematic bookkeeping of voyages and returns turns exploration into a disciplined state art."
 verne_doctrine_vernissage_regatta_laurels:0 "Regatta Laurels"
 verne_doctrine_vernissage_regatta_laurels_desc:0 "Maritime triumphs become part of the Vernissage itself, feeding state prestige back into the sailor economy."
 verne_doctrine_vernissage_worlds_on_display:0 "Worlds on Display"
 verne_doctrine_vernissage_worlds_on_display_desc:0 "The Vernissage becomes a worldly institution where commerce, prestige, and global curiosity are displayed as one."

 verne_doctrine_dragonwake:0 "Dragonwake Ideas"
 verne_doctrine_dragonwake_desc:0 "The Dragonwake doctrine raises wyvern nobility and martial dynastic discipline into a coherent doctrine of shock, professionalism, and aerial command."
 verne_doctrine_dragonwake_sky_lance_discipline:0 "Sky-Lance Discipline"
 verne_doctrine_dragonwake_sky_lance_discipline_desc:0 "Wyvern riders are drilled as an elite lance arm rather than a merely ceremonial aristocratic corps."
 verne_doctrine_dragonwake_muster:0 "The Dragonwake Muster"
 verne_doctrine_dragonwake_muster_desc:0 "Wyvern service is formalized into a recurring muster that deepens tradition and strengthens the officer class."
 verne_doctrine_dragonwake_aerial_reconnaissance:0 "Aerial Reconnaissance"
 verne_doctrine_dragonwake_aerial_reconnaissance_desc:0 "The Dragonwake gives Verne a rare capacity for battlefield maneuver and observation from above."
 verne_doctrine_dragonwake_storm_crowned_nobility:0 "Storm-Crowned Nobility"
 verne_doctrine_dragonwake_storm_crowned_nobility_desc:0 "The wyvern nobility is transformed into a more disciplined and professional military estate."
 verne_doctrine_dragonwake_red_wake_shock:0 "Red Wake Shock Doctrine"
 verne_doctrine_dragonwake_red_wake_shock_desc:0 "The most terrifying strength of the Dragonwake is not spectacle but the crushing shock of its first strike."
 verne_doctrine_dragonwake_knights_of_the_crimson_wing:0 "Knights of the Crimson Wing"
 verne_doctrine_dragonwake_knights_of_the_crimson_wing_desc:0 "Knightly service under the Dragonwake deepens martial tradition and gives wyvern warfare a noble institutional shell."

 verne_doctrine_grand_regatta:0 "Grand Regatta Ideas"
 verne_doctrine_grand_regatta_desc:0 "The Grand Regatta turns maritime competition into state capacity, building a doctrine of sailors, speed, navigation, and prestige at sea."
 verne_doctrine_grand_regatta_racing_harbours:0 "Racing Harbours"
 verne_doctrine_grand_regatta_racing_harbours_desc:0 "Harbours built for racing and ceremony also become stronger recruitment and logistics hubs."
 verne_doctrine_grand_regatta_laurels_of_the_helm:0 "Laurels of the Helm"
 verne_doctrine_grand_regatta_laurels_of_the_helm_desc:0 "Command prestige at sea is transformed into a real instrument of state legitimacy and naval ambition."
 verne_doctrine_grand_regatta_master_tidemaps:0 "Master Tidemaps"
 verne_doctrine_grand_regatta_master_tidemaps_desc:0 "The Regatta's pilots and mapmakers refine sea movement into a disciplined competitive science."
 verne_doctrine_grand_regatta_sailors_guilds:0 "Sailors' Guilds"
 verne_doctrine_grand_regatta_sailors_guilds_desc:0 "Guild organization makes Verne's sailor body deeper, faster to recover, and easier to sustain."
 verne_doctrine_grand_regatta_longwake_navigation:0 "Longwake Navigation"
 verne_doctrine_grand_regatta_longwake_navigation_desc:0 "Long-distance navigation practiced through the Regatta hardens crews and improves naval consistency."
 verne_doctrine_grand_regatta_regatta_drills:0 "Regatta Drills"
 verne_doctrine_grand_regatta_regatta_drills_desc:0 "Competition becomes preparation, turning racing discipline into real combat readiness and maritime utility."
 verne_doctrine_grand_regatta_sea_lords_festivals:0 "Sea-Lords' Festivals"
 verne_doctrine_grand_regatta_sea_lords_festivals_desc:0 "Ceremony, sailors, and commerce all feed one another when the sea-lords' prestige is ritualized across the coast."

 verne_doctrine_imperial_sea_court:0 "Imperial Sea Court Ideas"
 verne_doctrine_imperial_sea_court_desc:0 "Fleet-backed diplomacy, maritime prestige, and ceremonial sea power are organized into a doctrine fit for an imperial thalassocratic court."
 verne_doctrine_imperial_sea_court_oath_harbours:0 "Oath Harbours"
 verne_doctrine_imperial_sea_court_oath_harbours_desc:0 "Harbours bound by oath and ceremony give Verne a stronger network of naval diplomacy."
 verne_doctrine_imperial_sea_court_pearl_wreathed_audiences:0 "Pearl-Wreathed Audiences"
 verne_doctrine_imperial_sea_court_pearl_wreathed_audiences_desc:0 "Diplomatic audiences are transformed into sea-borne prestige rituals that improve Verne's standing abroad."
 verne_doctrine_imperial_sea_court_admirals_of_ceremony:0 "Admirals of Ceremony"
 verne_doctrine_imperial_sea_court_admirals_of_ceremony_desc:0 "Trade itself becomes a source of naval tradition when command is wrapped in public ceremony and maritime display."
 verne_doctrine_imperial_sea_court_convoys_of_prestige:0 "Convoys of Prestige"
 verne_doctrine_imperial_sea_court_convoys_of_prestige_desc:0 "Verne's diplomatic presence abroad is carried not only by envoys, but by fleets that visibly project prestige."
 verne_doctrine_imperial_sea_court_embassies_of_the_wake:0 "Embassies of the Wake"
 verne_doctrine_imperial_sea_court_embassies_of_the_wake_desc:0 "The wake of a Vernman fleet serves as an embassy in itself, accelerating contact across the world."
 verne_doctrine_imperial_sea_court_thrones_across_the_waves:0 "Thrones Across the Waves"
 verne_doctrine_imperial_sea_court_thrones_across_the_waves_desc:0 "Imperial sea power turns commercial shipping into an extension of courtly influence and rank."

 verne_doctrine_estuary_companies:0 "Estuary Companies Ideas"
 verne_doctrine_estuary_companies_desc:0 "Port finance, estuarine commerce, and disciplined maritime investment are woven into a doctrine of fiscal ship-state power."
 verne_doctrine_estuary_companies_harbor_assessors:0 "Harbor Assessors"
 verne_doctrine_estuary_companies_harbor_assessors_desc:0 "Professional assessors and dockside accountants tighten the state's commercial returns."
 verne_doctrine_estuary_companies_licensed_wharves:0 "Licensed Wharves"
 verne_doctrine_estuary_companies_licensed_wharves_desc:0 "Licensed wharves convert private initiative into public shipping strength and better harbor throughput."
 verne_doctrine_estuary_companies_bonded_warehouses:0 "Bonded Warehouses"
 verne_doctrine_estuary_companies_bonded_warehouses_desc:0 "Warehousing and bonded storage turn estuarine control into reliable output and commercial density."
 verne_doctrine_estuary_companies_river_sea_taxation:0 "River-Sea Taxation"
 verne_doctrine_estuary_companies_river_sea_taxation_desc:0 "The state learns to tax the river-sea nexus with enough precision to lower borrowing strain."
 verne_doctrine_estuary_companies_captains_accounts:0 "Captains' Accounts"
 verne_doctrine_estuary_companies_captains_accounts_desc:0 "Detailed accounting keeps shipping costs lower and makes every voyage more legible to the state."
 verne_doctrine_estuary_companies_crowned_investors:0 "Crowned Investors"
 verne_doctrine_estuary_companies_crowned_investors_desc:0 "Royal and ducal investment in estuarine commerce turns capital accumulation into a direct tool of state growth."

 verne_doctrine_red_court:0 "Red Court Ideas"
 verne_doctrine_red_court_desc:0 "The Red Court transforms dynastic magic and mage administration into a systematic doctrine of courtly statecraft."
 verne_doctrine_red_court_scarlet_curriculum:0 "The Scarlet Curriculum"
 verne_doctrine_red_court_scarlet_curriculum_desc:0 "Instruction in magic and administration broadens Verne's courtly talent pool."
 verne_doctrine_red_court_magisteries:0 "Court Magisteries"
 verne_doctrine_red_court_magisteries_desc:0 "Magisterial offices convert the Red Court into a source of ongoing state capacity."
 verne_doctrine_red_court_record_offices:0 "Arcane Record Offices"
 verne_doctrine_red_court_record_offices_desc:0 "State magic becomes legible and governable when the court keeps proper arcane records."
 verne_doctrine_red_court_secretariat:0 "The Red Secretariat"
 verne_doctrine_red_court_secretariat_desc:0 "The secretariat transforms red-court power into stable institutional procedure."
 verne_doctrine_red_court_wards:0 "Wards of the Ducal Household"
 verne_doctrine_red_court_wards_desc:0 "The ducal household is protected and educated through a permanent red-court warding tradition."
 verne_doctrine_red_court_bloodline_examinations:0 "Bloodline Examinations"
 verne_doctrine_red_court_bloodline_examinations_desc:0 "The Red Court treats dynastic quality as a matter of scrutiny, instruction, and magical cultivation."

 verne_doctrine_khenak_foundry:0 "Khenak Foundry Ideas"
 verne_doctrine_khenak_foundry_desc:0 "Verne's military-industry is systematized through foundries, powder works, and the red-brass state."
 verne_doctrine_khenak_foundry_apprenticeships:0 "Foundry Apprenticeships"
 verne_doctrine_khenak_foundry_apprenticeships_desc:0 "A formal apprenticeship system turns workshops into engines of state production."
 verne_doctrine_khenak_foundry_powder_magazines:0 "Powder Magazines"
 verne_doctrine_khenak_foundry_powder_magazines_desc:0 "Careful storage and supply of powder harden fortifications and sustain prolonged war-making."
 verne_doctrine_khenak_foundry_iron_roads:0 "Iron Roads to the Harbours"
 verne_doctrine_khenak_foundry_iron_roads_desc:0 "The Khenak road-and-harbour nexus ties development directly to military logistics."
 verne_doctrine_khenak_foundry_state_artillery_parks:0 "State Artillery Parks"
 verne_doctrine_khenak_foundry_state_artillery_parks_desc:0 "Verne's artillery is increasingly housed, drilled, and supplied through permanent state parks."
 verne_doctrine_khenak_foundry_master_gunfounders:0 "Master Gunfounders"
 verne_doctrine_khenak_foundry_master_gunfounders_desc:0 "The best gunfounders turn Khenak's industrial base into a sharper instrument of war."
 verne_doctrine_khenak_foundry_furnaces:0 "Khenak Furnaces"
 verne_doctrine_khenak_foundry_furnaces_desc:0 "The furnaces of Khenak feed Verne's manpower system as much as its metalworks."

 verne_doctrine_overseas_commandery:0 "Overseas Commandery Ideas"
 verne_doctrine_overseas_commandery_desc:0 "Strategic footholds, island stations, and loyal captains are woven into a doctrine of durable overseas command."
 verne_doctrine_overseas_commandery_fortified_havens:0 "Fortified Havens"
 verne_doctrine_overseas_commandery_fortified_havens_desc:0 "Every strong haven abroad extends Vernman staying power and punishes hostile fleets that linger nearby."
 verne_doctrine_overseas_commandery_ducal_factors_abroad:0 "Ducal Factors Abroad"
 verne_doctrine_overseas_commandery_ducal_factors_abroad_desc:0 "State-backed factors and agents extend Verne's commercial and administrative hand into distant waters."
 verne_doctrine_overseas_commandery_charters:0 "Commandery Charters"
 verne_doctrine_overseas_commandery_charters_desc:0 "Commanderies are formalized through charters that tie naval logistics to subject-supported growth."
 verne_doctrine_overseas_commandery_loyal_captains:0 "Loyal Captains Overseas"
 verne_doctrine_overseas_commandery_loyal_captains_desc:0 "Vernman authority abroad rests on a cadre of captains whose loyalty helps keep distant holdings obedient."
 verne_doctrine_overseas_commandery_island_magazines:0 "Island Magazines"
 verne_doctrine_overseas_commandery_island_magazines_desc:0 "Logistical depth abroad comes from carefully provisioned depots and magazines across key stations."
 verne_doctrine_overseas_commandery_long_hand_of_verne:0 "The Long Hand of Verne"
 verne_doctrine_overseas_commandery_long_hand_of_verne_desc:0 "What begins as a coastal principality becomes a power able to reach, govern, and absorb distant commanderies."

 verne_doctrine_eastern_correspondence:0 "Eastern Correspondence Ideas"
 verne_doctrine_eastern_correspondence_desc:0 "Embassies, letters, gifts, and negotiated access abroad form a doctrine of polished long-distance diplomacy."
 verne_doctrine_eastern_correspondence_translators_of_the_wake:0 "Translators of the Wake"
 verne_doctrine_eastern_correspondence_translators_of_the_wake_desc:0 "Translation and interpretation are treated as state skills equal to command at sea."
 verne_doctrine_eastern_correspondence_embassy_hosts:0 "Embassy Hosts"
 verne_doctrine_eastern_correspondence_embassy_hosts_desc:0 "Hosts, receptions, and public diplomacy elevate Vernman prestige in distant courts."
 verne_doctrine_eastern_correspondence_pearl_road_agents:0 "Pearl Road Agents"
 verne_doctrine_eastern_correspondence_pearl_road_agents_desc:0 "Commercial agents and court intermediaries turn prestige networks into practical trade influence."
 verne_doctrine_eastern_correspondence_courtly_interpreters:0 "Courtly Interpreters"
 verne_doctrine_eastern_correspondence_courtly_interpreters_desc:0 "Interpretation becomes a form of statecraft when Verne's courts speak fluently across worlds and customs."
 verne_doctrine_eastern_correspondence_overseas_correspondents:0 "Overseas Correspondents"
 verne_doctrine_eastern_correspondence_overseas_correspondents_desc:0 "Far-flung correspondents tie commerce, diplomacy, and information into one outward-looking network."
 verne_doctrine_eastern_correspondence_princes_exchanges:0 "Princes' Exchanges"
 verne_doctrine_eastern_correspondence_princes_exchanges_desc:0 "Regular exchanges among elites make conquest easier to digest and distant rule easier to normalize."

 verne_doctrine_crimson_wake_order:0 "Crimson Wake Order Ideas"
 verne_doctrine_crimson_wake_order_desc:0 "Knightly orders, institutional retinues, and subsidized mounted service are hardened into a military doctrine of elite state riders."
 verne_doctrine_crimson_wake_order_muster_houses:0 "Order Muster-Houses"
 verne_doctrine_crimson_wake_order_muster_houses_desc:0 "Order infrastructure lowers the ongoing burden of elite service and keeps Vernman martial orders in the field."
 verne_doctrine_crimson_wake_order_bannered_retinues:0 "Bannered Retinues"
 verne_doctrine_crimson_wake_order_bannered_retinues_desc:0 "Retinues tied to banners and office give the Crimson Wake a more reliable leadership corps."
 verne_doctrine_crimson_wake_order_oath_trained_lances:0 "Oath-Trained Lances"
 verne_doctrine_crimson_wake_order_oath_trained_lances_desc:0 "The order's riders are trained under oath, making cavalry service more disciplined and institutionally durable."
 verne_doctrine_crimson_wake_order_ducal_subsidies:0 "Ducal Subsidies"
 verne_doctrine_crimson_wake_order_ducal_subsidies_desc:0 "Subsidized elite service ensures the Crimson Wake remains a practical arm of the state rather than a purely noble indulgence."
 verne_doctrine_crimson_wake_order_marshal_chaplains:0 "Marshal-Chaplains"
 verne_doctrine_crimson_wake_order_marshal_chaplains_desc:0 "The order's internal discipline and martial instruction deepen Verne's professional military tradition."
 verne_doctrine_crimson_wake_order_permanent_commanderies:0 "Permanent Commanderies"
 verne_doctrine_crimson_wake_order_permanent_commanderies_desc:0 "Permanent commanderies turn knightly power into fixed state infrastructure that can be expanded and sustained."

 verne_doctrine_battle_evocation:0 "Battle-Evocation Ideas"
 verne_doctrine_battle_evocation_desc:0 "War-mage command and battlefield sorcery are transformed into a doctrine of offensive magical professionalism."
 verne_doctrine_battle_evocation_field_evocations:0 "Field Evocations"
 verne_doctrine_battle_evocation_field_evocations_desc:0 "Evocation becomes a field discipline rather than merely a court display."
 verne_doctrine_battle_evocation_battlemagi:0 "Red Wake Battlemagi"
 verne_doctrine_battle_evocation_battlemagi_desc:0 "The Battlemagi of the Red Wake formalize Verne's magical officer corps in war."
 verne_doctrine_battle_evocation_spell_guided_batteries:0 "Spell-Guided Batteries"
 verne_doctrine_battle_evocation_spell_guided_batteries_desc:0 "Evocation and artillery are fused into a more precise and destructive battlefield method."
 verne_doctrine_battle_evocation_stormline_doctrine:0 "Stormline Doctrine"
 verne_doctrine_battle_evocation_stormline_doctrine_desc:0 "The army learns to break lines and fortresses with disciplined magical assault."
 verne_doctrine_battle_evocation_war_court_coordination:0 "War-Court Coordination"
 verne_doctrine_battle_evocation_war_court_coordination_desc:0 "The war court synchronizes magical planning with Vernman battlefield command."
 verne_doctrine_battle_evocation_prince_in_the_van:0 "The Prince in the Van"
 verne_doctrine_battle_evocation_prince_in_the_van_desc:0 "In Verne, command magic and princely leadership are expected to stand at the front of war."

 verne_doctrine_red_brass:0 "Red Brass Ideas"
 verne_doctrine_red_brass_desc:0 "Artillery, red-brass engineering, and fleet gunnery are organized into a doctrine of methodical destructive force."
 verne_doctrine_red_brass_foundry_calibration:0 "Foundry Calibration"
 verne_doctrine_red_brass_foundry_calibration_desc:0 "Careful calibration turns foundry output into a sharper and more disciplined weapon system."
 verne_doctrine_red_brass_powder_discipline:0 "Powder Discipline"
 verne_doctrine_red_brass_powder_discipline_desc:0 "The management of powder, charges, and magazines becomes a state discipline in itself."
 verne_doctrine_red_brass_siege_engineers:0 "Siege Engineers"
 verne_doctrine_red_brass_siege_engineers_desc:0 "Verne's engineers transform bombardment into a more exact and organized art of reduction."
 verne_doctrine_red_brass_hull_guns:0 "Red-Brass Hull Guns"
 verne_doctrine_red_brass_hull_guns_desc:0 "The red-brass tradition serves the fleet as much as the field army, sharpening naval gunnery doctrine."
 verne_doctrine_red_brass_gunnery_instructors:0 "Gunnery Instructors"
 verne_doctrine_red_brass_gunnery_instructors_desc:0 "Instruction and drill turn artillery and naval firepower into reproducible state competence."
 verne_doctrine_red_brass_ironwilled_crews:0 "Ironwilled Crews"
 verne_doctrine_red_brass_ironwilled_crews_desc:0 "Disciplined crews and engineers make Vernman warcraft harder to break and harder to replace."

 verne_doctrine_sea_lance:0 "Sea-Lance Doctrine Ideas"
 verne_doctrine_sea_lance_desc:0 "Integrated air-sea warfare becomes a Vernman doctrine of maneuver, assault, and expeditionary reach."
 verne_doctrine_sea_lance_deck_lance_escorts:0 "Deck-Lance Escorts"
 verne_doctrine_sea_lance_deck_lance_escorts_desc:0 "Escort doctrine teaches Verne to treat air-sea coordination as a practical combat arm."
 verne_doctrine_sea_lance_sea_nest_coordination:0 "Sea-Nest Coordination"
 verne_doctrine_sea_lance_sea_nest_coordination_desc:0 "Wyvern nests and fleet decks are integrated into a more maneuverable strike doctrine."
 verne_doctrine_sea_lance_aerial_spotters:0 "Aerial Spotters"
 verne_doctrine_sea_lance_aerial_spotters_desc:0 "Aerial sighting and naval positioning together sharpen the Vernman operational picture."
 verne_doctrine_sea_lance_strike_convoys:0 "Strike Convoys"
 verne_doctrine_sea_lance_strike_convoys_desc:0 "Strike doctrine allows Vernman convoys to move with less attritional drag in hostile theaters."
 verne_doctrine_sea_lance_wakeborne_assaults:0 "Wakeborne Assaults"
 verne_doctrine_sea_lance_wakeborne_assaults_desc:0 "Wakeborne assault methods teach Verne to sustain expeditionary action over water with less loss."
 verne_doctrine_sea_lance_oceanic_pursuit:0 "Oceanic Pursuit"
 verne_doctrine_sea_lance_oceanic_pursuit_desc:0 "The Sea-Lance doctrine culminates in aggressive operational pursuit across whole maritime theaters."

 verne_doctrine_corinite_stewardship:0 "Corinite Stewardship Ideas"
 verne_doctrine_corinite_stewardship_desc:0 "The Corinite state is organized through pious administration, mission discipline, and dynastic legitimacy under faith."
 verne_doctrine_corinite_stewardship_offices_of_instruction:0 "Offices of Pious Instruction"
 verne_doctrine_corinite_stewardship_offices_of_instruction_desc:0 "Faith and administration are joined in offices that teach piety as a state discipline."
 verne_doctrine_corinite_stewardship_record_keepers:0 "Corinite Record-Keepers"
 verne_doctrine_corinite_stewardship_record_keepers_desc:0 "The state keeps the ledgers of faith with enough rigor to steady unrest and stability alike."
 verne_doctrine_corinite_stewardship_tithes_of_the_crown:0 "Tithes of the Crown"
 verne_doctrine_corinite_stewardship_tithes_of_the_crown_desc:0 "Crown and altar are bound together through a disciplined regime of loyalty and legitimacy."
 verne_doctrine_corinite_stewardship_concord_of_oaths:0 "Concord of Oaths and Faith"
 verne_doctrine_corinite_stewardship_concord_of_oaths_desc:0 "In Verne, oath and creed become mutually reinforcing instruments of state order."
 verne_doctrine_corinite_stewardship_pilgrim_administration:0 "Pilgrim Administration"
 verne_doctrine_corinite_stewardship_pilgrim_administration_desc:0 "The state learns to administer pilgrimage, devotion, and courtly reputation as a single faith-bearing system."
 verne_doctrine_corinite_stewardship_emperors_example:0 "The Emperor's Example"
 verne_doctrine_corinite_stewardship_emperors_example_desc:0 "The ruler's public example becomes part of the machinery that keeps the clergy aligned and loyal."

 verne_doctrine_imperial_chancery:0 "Imperial Chancery Ideas"
 verne_doctrine_imperial_chancery_desc:0 "Compact imperial government is formalized through ledgers, seals, audits, and the hard grammar of state administration."
 verne_doctrine_imperial_chancery_crownland_surveyors:0 "Crownland Surveyors"
 verne_doctrine_imperial_chancery_crownland_surveyors_desc:0 "Surveyors and clerks turn the imperial estate into a more governable and less wasteful machine."
 verne_doctrine_imperial_chancery_imperial_proctors:0 "Imperial Proctors"
 verne_doctrine_imperial_chancery_imperial_proctors_desc:0 "Imperial proctors carry order into the provinces and keep rebellion harder to sustain."
 verne_doctrine_imperial_chancery_measured_autonomies:0 "Measured Autonomies"
 verne_doctrine_imperial_chancery_measured_autonomies_desc:0 "Autonomy is managed as a calibrated state tool rather than surrendered through weakness."
 verne_doctrine_imperial_chancery_unified_seals:0 "Unified Seals"
 verne_doctrine_imperial_chancery_unified_seals_desc:0 "The unification of seals, forms, and authority makes annexation and integration smoother."
 verne_doctrine_imperial_chancery_auditors:0 "Auditors of the Marches"
 verne_doctrine_imperial_chancery_auditors_desc:0 "Auditors keep the edge of empire legible, taxable, and politically useful to the crown."
 verne_doctrine_imperial_chancery_absolutes:0 "Chancery Absolutes"
 verne_doctrine_imperial_chancery_absolutes_desc:0 "Administrative technique itself becomes a source of imperial efficiency and strength."

 verne_doctrine_apostolic_sea_lanes:0 "Apostolic Sea-Lanes Ideas"
 verne_doctrine_apostolic_sea_lanes_desc:0 "Maritime movement, evangelization, and diplomatic prestige are fused into a faith-bearing doctrine of sea power."
 verne_doctrine_apostolic_sea_lanes_pilgrim_convoys:0 "Pilgrim Convoys"
 verne_doctrine_apostolic_sea_lanes_pilgrim_convoys_desc:0 "The movement of pilgrims and holy traffic becomes a source of naval discipline and prestige."
 verne_doctrine_apostolic_sea_lanes_sacred_harbours:0 "Sacred Harbours"
 verne_doctrine_apostolic_sea_lanes_sacred_harbours_desc:0 "Harbours sanctified by faith and commerce alike turn piety into practical maritime power."
 verne_doctrine_apostolic_sea_lanes_chartmakers:0 "Apostolic Chartmakers"
 verne_doctrine_apostolic_sea_lanes_chartmakers_desc:0 "The faithful mapping of sea-lanes gives Corinite power a more durable maritime infrastructure."
 verne_doctrine_apostolic_sea_lanes_bannered_convictions:0 "Bannered Convictions"
 verne_doctrine_apostolic_sea_lanes_bannered_convictions_desc:0 "Faith and fleet become harder to separate when the banner itself carries apostolic conviction."
 verne_doctrine_apostolic_sea_lanes_preachers:0 "Sea-Lane Preachers"
 verne_doctrine_apostolic_sea_lanes_preachers_desc:0 "Missionary work travels with fleets and trade, turning the wake of Verne into a missionary instrument."
 verne_doctrine_apostolic_sea_lanes_wake_of_corin:0 "The Wake of Corin"
 verne_doctrine_apostolic_sea_lanes_wake_of_corin_desc:0 "The sea itself becomes part of Corinite prestige when Verne's fleets carry faith with them."

 verne_doctrine_pearlescent_concord:0 "Pearlescent Concord Ideas"
 verne_doctrine_pearlescent_concord_desc:0 "Alliance webs, princely mediation, and prestige diplomacy become a coherent doctrine of managed concord."
 verne_doctrine_pearlescent_concord_crowned_mediators:0 "Crowned Mediators"
 verne_doctrine_pearlescent_concord_crowned_mediators_desc:0 "Verne's court learns to rule by reconciliation, arbitration, and crowned prestige abroad."
 verne_doctrine_pearlescent_concord_wedding_fleets:0 "Wedding Fleets"
 verne_doctrine_pearlescent_concord_wedding_fleets_desc:0 "Marriage and maritime display reinforce each other when fleets themselves serve as instruments of dynastic grandeur."
 verne_doctrine_pearlescent_concord_trusted_envoys:0 "Trusted Envoys"
 verne_doctrine_pearlescent_concord_trusted_envoys_desc:0 "Prestige is made durable when envoys become known for consistency, reliability, and tact."
 verne_doctrine_pearlescent_concord_oath_bound_vassals:0 "Oath-Bound Vassals"
 verne_doctrine_pearlescent_concord_oath_bound_vassals_desc:0 "The concord extends into subject relations, lowering resistance through honor, prestige, and expectation."
 verne_doctrine_pearlescent_concord_feasts_of_reconciliation:0 "Feasts of Reconciliation"
 verne_doctrine_pearlescent_concord_feasts_of_reconciliation_desc:0 "Courtly ceremony becomes a diplomatic tool that accelerates repair and stabilizes relations."
 verne_doctrine_pearlescent_concord_princes_word:0 "The Prince's Word"
 verne_doctrine_pearlescent_concord_princes_word_desc:0 "When the prince's word carries enough prestige, integration and annexation become easier to secure."

 verne_doctrine_apostolic_valour:0 "Apostolic Valour Ideas"
 verne_doctrine_apostolic_valour_desc:0 "Corinite militancy and righteous imperial war are transformed into a disciplined doctrine of devotion in battle."
 verne_doctrine_apostolic_valour_bannered_devotion:0 "Bannered Devotion"
 verne_doctrine_apostolic_valour_bannered_devotion_desc:0 "The army carries its devotion into battle and makes prestige out of public piety under arms."
 verne_doctrine_apostolic_valour_march_sermons:0 "March Sermons"
 verne_doctrine_apostolic_valour_march_sermons_desc:0 "Preaching becomes part of the army's campaigning discipline, sustaining morale and conversion alike."
 verne_doctrine_apostolic_valour_sacred_drill:0 "Sacred Drill"
 verne_doctrine_apostolic_valour_sacred_drill_desc:0 "Drill and devotion are treated as complements rather than rivals in the imperial army."
 verne_doctrine_apostolic_valour_righteous_charges:0 "Righteous Charges"
 verne_doctrine_apostolic_valour_righteous_charges_desc:0 "The army is taught that righteous shock can be a statecraft of its own."
 verne_doctrine_apostolic_valour_commanderies:0 "Commanderies of Valour"
 verne_doctrine_apostolic_valour_commanderies_desc:0 "Militant commanderies institutionalize piety and prestige as tools of permanent war-readiness."
 verne_doctrine_apostolic_valour_emperors_sword:0 "The Emperor's Sword"
 verne_doctrine_apostolic_valour_emperors_sword_desc:0 "The ruler's sword becomes an article of state devotion and a source of military endurance."

 verne_doctrine_silver_banner:0 "Silver Banner Ideas"
 verne_doctrine_silver_banner_desc:0 "Compact elite force, court discipline, and professional military excellence are fused into a doctrine of silver-bannered dominance."
 verne_doctrine_silver_banner_drillmasters:0 "Ducal Drillmasters"
 verne_doctrine_silver_banner_drillmasters_desc:0 "The ducal state elevates drill and professionalism into one of its defining military arts."
 verne_doctrine_silver_banner_parade_standards:0 "Parade Ground Standards"
 verne_doctrine_silver_banner_parade_standards_desc:0 "Ceremony is turned into practical military rigor when parade standards become field expectations."
 verne_doctrine_silver_banner_veteran_cadres:0 "Veteran Cadres"
 verne_doctrine_silver_banner_veteran_cadres_desc:0 "The Silver Banner favors a hard core of veteran infantry that anchors the whole field army."
 verne_doctrine_silver_banner_chosen_captains:0 "Chosen Captains"
 verne_doctrine_silver_banner_chosen_captains_desc:0 "Verne's finest captains are selected to lead a narrower, harder elite war machine."
 verne_doctrine_silver_banner_silver_line:0 "The Silver Line"
 verne_doctrine_silver_banner_silver_line_desc:0 "The line itself becomes a prestige-bearing institution of disciplined force and organized mass."
 verne_doctrine_silver_banner_reserve_companies:0 "Imperial Reserve Companies"
 verne_doctrine_silver_banner_reserve_companies_desc:0 "Reserve companies are drilled and replenished fast enough to sustain elite warfare over the long term."

 # --- v0.3 first-wave verne doctrine policies ---
 verne_silver_wake_oath_harbormasters_act:0 "Act of the Oathbound Harbormasters"
 verne_silver_wake_oath_harbormasters_act_desc:0 "Silver Wake discipline paired with the Court of Silver Oaths creates a harbor administration that is both trusted abroad and orderly at home."

 verne_silver_wake_captains_charter_act:0 "Captains' Charter Act"
 verne_silver_wake_captains_charter_act_desc:0 "Where the Silver Wake and the Charter of Great Captains meet, Verne rewards practical convoy leadership, disciplined commerce, and steady seamanship."

 verne_silver_wake_ducal_convoy_ordinance_act:0 "Ducal Convoy Ordinance"
 verne_silver_wake_ducal_convoy_ordinance_act_desc:0 "Armoc's muster traditions are applied to convoy security, producing a fleet-backed state that recovers manpower reliably and hardens its key strongpoints."

 verne_silver_wake_quayside_discipline_act:0 "Quayside Discipline Act"
 verne_silver_wake_quayside_discipline_act_desc:0 "This general Silver Wake statute extends dockside discipline across the realm, reducing unrest and keeping sailor administration from slipping into wasteful disorder."

 verne_articles_of_the_silver_admiralty:0 "Articles of the Silver Admiralty"
 verne_articles_of_the_silver_admiralty_desc:0 "Silver Oaths statecraft and the Imperial Sea Court together produce a disciplined maritime code of legitimacy, fleet poise, and naval authority."

 verne_charter_of_overseas_audiences:0 "Charter of Overseas Audiences"
 verne_charter_of_overseas_audiences_desc:0 "Courtly diplomacy and Vernissage projection combine to speed contact abroad and improve Verne's standing in distant halls."

 verne_ordinance_of_noble_service:0 "Ordinance of Noble Service"
 verne_ordinance_of_noble_service_desc:0 "Silver Oaths administration and Dragonwake martial custom are fused into a service code that honors noble arms while strengthening dynastic legitimacy."

 verne_heartspier_shipping_code:0 "Heartspier Shipping Code"
 verne_heartspier_shipping_code_desc:0 "Port-finance discipline and Regatta seamanship combine into a shipping code that sharpens light-ship performance and maritime commerce."

 verne_convoys_of_state:0 "Convoys of State"
 verne_convoys_of_state_desc:0 "The sea court and Heartspier's companies together transform convoys into instruments of both commerce and state prestige."

 verne_accords_of_the_eastern_princes:0 "Accords of the Eastern Princes"
 verne_accords_of_the_eastern_princes_desc:0 "Vernissage prestige and eastern correspondence join into a diplomatic network that extends Verne's reach and authority abroad."

 verne_regatta_of_distant_harbours:0 "Regatta of Distant Harbours"
 verne_regatta_of_distant_harbours_desc:0 "The Vernissage and the Grand Regatta together turn world-facing maritime display into faster fleets and deeper sailor culture."

 verne_articles_of_remote_command:0 "Articles of Remote Command"
 verne_articles_of_remote_command_desc:0 "Overseas commandery doctrine and Vernissage projection produce a stronger legal and logistical framework for distant rule."

