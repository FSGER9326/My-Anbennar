verne_expand_foundry_tt:0 "Grants permanent goods produced bonus in the Khenak area. Multi-province industrial synergy."

verne_khenak_steel_program:0 "Khenak Steel Program"
verne_khenak_steel_program_desc:0 "Advanced metallurgy for military equipment -- the finest steel in Halann forged in the fires of the Khenak hills."
verne_khenak_steel_tt:0 "Grants permanent discipline and shock damage bonuses. Unlocks advanced military equipment event chain."

verne_industrial_logistics_chain:0 "Industrial Logistics Chain"
