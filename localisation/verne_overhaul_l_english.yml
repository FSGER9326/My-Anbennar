l_english:
 # ===============================================
 # Verne Overhaul Localisation — Full Skeleton
 # Ownership: Verne overhaul (v0.3)
 # Scope: missions, modifiers, events, tooltips, doctrines, advisors, mercs, reforms
 # ===============================================

 # ============================================================
 # LANE 1 — THE VERNE COURT & OATHS
 # ============================================================

 # --- Missions ---
 A33_formalize_silver_oaths_desc:0 "Establish the ancient Silver Oaths as a formal diplomatic system binding foreign powers to Verne. These ancient pacts, enforced by magical courts rather than blood ties, will form the foundation of Verne's diplomatic future."
 A33_establish_court_of_oaths_desc:0 "Institutionalize the Silver Oaths into a standing court with enforcement powers. The Court of Oaths will become the beating heart of Verne's diplomatic machine, binding subjects and allies alike through arcane contract."
 A33_royal_arbitration_desc:0 "Expand the Court's mandate to include binding arbitration between Verne and its subjects. In Verne, the duke is judge, jury, and enforcement — and the Silver Oaths ensure all parties accept the verdict."
 A33_diplomatic_hegemony_desc:0 "Verne's web of oaths and alliances now makes it the unchallenged diplomatic hegemon of the world. Allies do not waver. Subjects do not rebel. The Silver Court speaks, and Halann listens."

 # --- Modifiers ---
 verne_silver_oaths:0 "Silver Oaths"
 verne_silver_oaths_desc:0 "The Silver Oaths grant Verne enhanced diplomatic standing and vassal loyalty through arcane contracts that bind foreign powers to the ducal court."
 verne_court_of_oaths:0 "Court of Oaths"
 verne_court_of_oaths_desc:0 "The Court of Oaths streamlines the annexation of willing subjects and strengthens Verne's web of diplomatic connections."
 verne_royal_arbitration:0 "Royal Arbitration"
 verne_royal_arbitration_desc:0 "Royal arbitration ensures subjects remain loyal and content under Verne's binding legal framework."
 verne_diplomatic_hegemony:0 "Diplomatic Hegemony"
 verne_diplomatic_hegemony_desc:0 "Verne's diplomatic hegemony ensures allies never waver and subjects never rebel — the Silver Court stands unchallenged."

 # --- Custom Tooltips ---
 verne_silver_oaths_tt:0 "Verne's Silver Oaths system allows binding diplomatic contracts that persist beyond normal alliance mechanics."

 # ============================================================
 # LANE 2 — MARITIME EMPIRE
 # ============================================================

 # --- Missions ---
 A33_secure_port_of_heartspier_desc:0 "Harden Verne's primary port against pirate raids and rival navies. Heartspier is the economic heart of the realm — its port drives the entire Crimson Wake trade network."
 A33_form_estuary_companies_desc:0 "Charter semi-autonomous trade guilds to control key estuary provinces. These companies channel wealth through Verne's waterways, turning river mouths into engines of maritime commerce."
 A33_fleet_of_the_crimson_wake_desc:0 "Build a fleet worthy of Verne's crimson-sailed legacy. The Crimson Wake earned its name from the red-bannered warships that patrol Verne's trade routes — now those sails must rule the seas."
 A33_imperial_sea_court_desc:0 "Establish a permanent maritime court to govern Verne's oceanic interests. The Sea Court adjudicates maritime law across Verne's sphere of influence, projecting power as reliably as fleets project force."

 # --- Province Modifiers ---
 verne_heartspier_port:0 "Heartspier Harbour"
 verne_heartspier_port_desc:0 "Heartspier's harbour has been fortified against pirate raids and rival navies, swelling the ranks of Verne's sailors."
 verne_heartspier_trade_powers:0 "Heartspier Trade Powers"
 verne_heartspier_trade_powers_desc:0 "Light ships operating from Heartspier enjoy enhanced trade power through disciplined harbour administration."

 # --- Country Modifiers ---
 verne_heartspier_companies:0 "Estuary Companies"
 verne_heartspier_companies_desc:0 "The Estuary Companies channel wealth through Verne's ports, sharpening trade efficiency and light ship performance."
 verne_crimson_wake_fleet:0 "Fleet of the Crimson Wake"
 verne_crimson_wake_fleet_desc:0 "The Crimson Wake fleet ensures naval dominance across Verne's trade routes, building tradition and morale with every voyage."
 verne_crimson_wake_discount:0 "Crimson Wake Construction Drive"
 verne_crimson_wake_discount_desc:0 "Massive shipbuilding investment reduces construction costs as the Crimson Wake fleet expands."
 verne_imperial_sea_court:0 "Imperial Sea Court"
 verne_imperial_sea_court_desc:0 "The Imperial Sea Court projects Verne's power across the seas, combining diplomatic prestige with naval authority."

 # ============================================================
 # LANE 3 — DYNASTIC MACHINE
 # ============================================================

 # --- Missions ---
 A33_enact_dynastic_safeguard_desc:0 "Establish legal protections for Verne's succession to prevent future crises. The Safeguard was enacted after the Succession Crisis of 1444, ensuring Verne would never again face an unclaimed throne."
 A33_expand_noble_privileges_desc:0 "Grant expanded privileges to Verne's noble houses in exchange for their unwavering loyalty. The expanded privileges cement the noble houses as partners, not rivals, in Verne's governance."
 A33_exalted_dynasty_machine_desc:0 "Activate the ancient magical apparatus that elevates Verne's ruling dynasty to divine status. The Exalted Dynasty Machine amplifies the ruling family's aura, making them literally divinely anointed."

 # --- Modifiers ---
 verne_dynastic_safeguard:0 "Dynastic Safeguard"
 verne_dynastic_safeguard_desc:0 "The Dynastic Safeguard ensures stable succession in Verne, reducing the chance of random events targeting the throne."
 verne_noble_charter:0 "Noble Charter"
 verne_noble_charter_desc:0 "The Noble Charter binds the aristocracy to the crown through shared interests, boosting manpower and noble loyalty."
 verne_exalted_dynasty_machine:0 "Exalted Dynasty Machine"
 verne_exalted_dynasty_machine_desc:0 "The Exalted Dynasty Machine amplifies the ruling family's legitimacy through arcane means, spreading institutions and prestige."

 # ============================================================
 # LANE 4 — TRADE & COLONISATION
 # ============================================================

 # --- Missions ---
 A33_charter_overseas_companies_desc:0 "Grant royal charters to joint-stock companies for overseas expansion. These ventures fund exploration and settlement with Verne's ducal backing, turning curiosity into colonies."
 A33_distant_horizons_expansion_desc:0 "Establish a dedicated planning chamber to coordinate Verne's global expansion. The Hall of Distant Horizons maps and directs the realm's reach across every ocean."
 A33_overseas_commanderies_desc:0 "Formalize Verne's colonial provinces as commanderies under military governors. Commanderies are Verne's answer to governing distant lands — military governors with broad autonomy and fierce loyalty."

 # --- Modifiers ---
 verne_chartered_overseas_companies:0 "Chartered Overseas Companies"
 verne_chartered_overseas_companies_desc:0 "Chartered companies expand Verne's administrative capacity overseas, enabling broader colonial governance."
 verne_distant_horizons:0 "Distant Horizons"
 verne_distant_horizons_desc:0 "The Hall of Distant Horizons extends Verne's reach across the seas, improving colonial range, reducing attrition, and accelerating settlement."
 verne_overseas_commanderies:0 "Overseas Commanderies"
 verne_overseas_commanderies_desc:0 "Overseas Commanderies streamline colonial governance and trade, turning distant territories into administered provinces."

 # --- Decisions ---
 verne_charter_overseas_decision:0 "Charter Overseas Ventures"
 verne_charter_overseas_decision_desc:0 "Renew the royal charter for Verne's overseas companies, securing fresh investment for colonial expansion."
 verne_commandant_swap_decision:0 "Appoint a Commandant"
 verne_commandant_swap_decision_desc:0 "Replace a colonial governor with a military commandant, trading commercial efficiency for martial discipline."

 # ============================================================
 # LANE 5 — RED COURT & ARCANE
 # ============================================================

 # --- Missions ---
 A33_establish_red_court_desc:0 "Found Verne's arcane advisory council to study magical knowledge for statecraft. The Red Court is a council of mage-advisors whose insight transforms governance through magical precision."
 A33_dragonwake_ordinance_desc:0 "Formalize Verne's war magic doctrine based on ancient dragon resonance. The Dragonwake Ordinance names the magical resonance after the ancient dragon magic that Verne's mages learned to harness for warfare."
 A33_battle_mage_collegium_desc:0 "Establish a permanent institution for training mage-soldiers. The Collegium produces battle mages who channel destructive energy on the battlefield, giving Verne's armies a unique arcane edge."

 # --- Modifiers ---
 verne_red_court_advisory:0 "Red Court Advisory"
 verne_red_court_advisory_desc:0 "The Red Court enhances Verne's governance through arcane wisdom, expanding the advisor pool and accelerating reform."
 verne_dragonwake_profession:0 "Dragonwake Professionalism"
 verne_dragonwake_profession_desc:0 "The Dragonwake Ordinance drives constant improvement in military professionalism through disciplined war-mage training."
 verne_dragonwake_shock:0 "Dragonwake Shock Doctrine"
 verne_dragonwake_shock_desc:0 "Battlefield mages channel dragon resonance into devastating shock attacks, giving Verne's armies a fearsome first strike."
 verne_war_wizard:0 "War Wizard"
 verne_war_wizard_desc:0 "A war wizard of the Red Court commands devastating arcane power on the battlefield, turning the tide through magical fire and precision."
 verne_battle_mage_collegium:0 "Battle Mage Collegium"
 verne_battle_mage_collegium_desc:0 "The Battle Mage Collegium gives Verne's armies a devastating arcane edge through disciplined mage-soldier training."
 verne_collegium_fire_artillery:0 "Collegium Fire — Artillery"
 verne_collegium_fire_artillery_desc:0 "Battle mages enhance artillery batteries with spell-guided munitions, sharpening every volley."
 verne_collegium_fire_army:0 "Collegium Fire — Army"
 verne_collegium_fire_army_desc:0 "Evocation-trained officers bring arcane firepower to the field army, breaking enemy lines with magical precision."

 # ============================================================
 # LANE 6 — LEGITIMACY & RECOGNITION
 # ============================================================

 # --- Missions ---
 A33_entrench_royal_census_desc:0 "Establish a permanent census to document and legitimize Verne's rule over its population. In Verne, legitimacy comes from the Silver Oaths AND from documented governance — the Census proves you rule over real people, not just paper claims."
 A33_secure_academic_endowments_desc:0 "Fund a network of universities and academies to cement Verne's institutional authority. The Academic Endowments ensure Verne's mages and scholars have permanent, state-funded positions."
 A33_stamp_of_sovereign_legitimacy_desc:0 "Forge the Seal of Sovereign Legitimacy — the ultimate symbol of Verne's divinely sanctioned right to rule. The Seal is forged from the combined authority of Verne's institutions: the Court's oaths, the Dynasty's bloodline, and the Census's documentation."

 # --- Modifiers ---
 verne_royal_census:0 "Royal Census"
 verne_royal_census_desc:0 "The Royal Census ensures accurate documentation of Verne's subjects and territories, strengthening tax collection and reform progress."
 verne_academic_endowments:0 "Academic Endowments"
 verne_academic_endowments_desc:0 "Academic Endowments fund the brightest minds in Verne's service, accelerating institutional development and innovative thought."
 verne_sovereign_legitimacy:0 "Sovereign Legitimacy"
 verne_sovereign_legitimacy_desc:0 "The Stamp of Sovereign Legitimacy represents the convergence of Verne's institutional authority — oaths, bloodline, and documentation united."

 # ============================================================
 # LANE 8 — FAITH & APOSTOLIC EMPIRE
 # ============================================================

 # --- Missions ---
 A33_corinite_stewardship_desc:0 "Formalize Verne's role as guardian and patron of the Corinite faith. The Corinite Stewardship funds missions and holy orders, projecting Verne's piety as a tool of statecraft."
 A33_pearlescent_concord_desc:0 "Unite Corinite nations under a shared religious diplomatic framework. The Concord is a pact between Verne and other Corinite nations, binding faith and diplomacy into a single instrument."
 A33_world_faith_emperor_desc:0 "Claim supreme spiritual authority over all Corinite believers. The World Faith Emperor combines secular and religious power in one throne — Verne speaks for the faithful, and the faithful answer."

 # --- Modifiers ---

 verne_pearlescent_concord:0 "Pearlescent Concord"
 verne_pearlescent_concord_desc:0 "The Pearlescent Concord binds Corinite nations in mutual support, easing diplomatic annexation and reducing subject restlessness."
 verne_world_faith_emperor:0 "World Faith Emperor"
 verne_faith_emperor_innovat:0 "Faith Emperor's Innovativeness"
 verne_faith_emperor_innovat_desc:0 "Verne's spiritual authority drives innovative thought and strengthens missionary resolve across the realm."
 verne_minor_holy_order:0 "Minor Holy Order"
 verne_minor_holy_order_desc:0 "A small holy order founded under Verne's patronage, providing modest military and religious bonuses."

 # --- Custom Tooltips ---
 verne_cb_against_heathen_pirates_tt:0 "Grants a casus belli against heathen pirate states, allowing Verne to wage holy war against maritime raiders."

 # ============================================================
 # REUSABLE LAYER — v0.1 Modifiers
 # ============================================================

 # --- Adventure & Projection ---
 verne_adventure_projection_foothold:0 "Adventure Projection Foothold"
 verne_adventure_projection_foothold_desc:0 "The court has committed resources to secure an early Vernman foothold abroad."
 verne_adventure_projection_network:0 "Adventure Projection Network"
 verne_adventure_projection_network_desc:0 "Our maritime-adventure web is now organized as a reusable strategic network."
 verne_reward_old_friends_old_rivals:0 "Old Friends, Old Rivals"
 verne_reward_old_friends_old_rivals_desc:0 "This reward package anchors early diplomatic and trade momentum in the Verne overhaul flow."

 # --- Dynasty & Court ---
 verne_dynasty_protected_court:0 "Dynasty-Protected Court"
 verne_dynasty_protected_court_desc:0 "Court protocol and succession planning actively safeguard the Verne ruling line."
 verne_dynasty_exalted_lineage:0 "Exalted Verne Lineage"
 verne_dynasty_exalted_lineage_desc:0 "The ruling line has entered a consolidated exalted phase with stronger central authority."
 verne_marriage_court_protocol:0 "Marriage Court Protocol"
 verne_marriage_court_protocol_desc:0 "Formalized marriage-court institutions improve dynastic continuity and diplomatic positioning."
 verne_tarnished_courtly_reputation:0 "Tarnished Courtly Reputation"
 verne_tarnished_courtly_reputation_desc:0 "Court scandals weaken confidence in state discipline and raise governance friction."
 verne_reforged_court_consensus:0 "Reforged Court Consensus"
 verne_reforged_court_consensus_desc:0 "Having endured scandal and emerged with clearer institutions, Verne's court now projects steadier legitimacy and more disciplined statecraft."
 verne_curatorial_patronage:0 "Curatorial Patronage"
 verne_curatorial_patronage_desc:0 "Verne's court leans into prestige display, curated embassies, and world-facing ceremonial exchange."

 # --- Maritime & Administrative ---
 verne_harbormaster_general_staff:0 "Harbormaster General Staff"
 verne_harbormaster_general_staff_desc:0 "The Silver Wake's disciplined harbor service has been elevated into a state command apparatus for commerce, shipping, and mobilization."
 verne_pearlescent_diplomatic_corps:0 "Pearlescent Diplomatic Corps"
 verne_pearlescent_diplomatic_corps_desc:0 "Verne's dynastic court and world-facing ceremonial machine now sustain a more disciplined and effective diplomatic service."
 verne_union_court_protocols:0 "Union Court Protocols"
 verne_union_court_protocols_desc:0 "Court ceremony, marriage diplomacy, and dynastic administration have been formalized into a stronger protocol of personal union governance."
 verne_imperial_maritime_court:0 "Imperial Maritime Court"
 verne_imperial_maritime_court_desc:0 "Verne's overseas prestige, trade governance, and naval ceremony have fused into a higher courtly-maritime state form."
 verne_apostolic_oceanic_command:0 "Apostolic Oceanic Command"
 verne_apostolic_oceanic_command_desc:0 "Verne's holy wars and seaborne command structures now reinforce each other, turning faith and fleet into a single instrument of expansion."
 verne_halanni_exposition_bureau:0 "Halanni Exposition Bureau"
 verne_halanni_exposition_bureau_desc:0 "The grand exposition has hardened into an enduring apparatus of prestige diplomacy, foreign audiences, and world-facing court organization."
 verne_overseas_commonwealth:0 "Overseas Commonwealth"
 verne_overseas_commonwealth_desc:0 "Verne's overseas possessions and subject structures are no longer a loose web of adventures, but a more coherent commonwealth of governed expansion."

 # --- Decay & Crisis ---
 verne_fading_ducal_authority:0 "Fading Ducal Authority"
 verne_fading_ducal_authority_desc:0 "Ducal authority is visibly weakening, emboldening challengers across the realm."
 verne_empty_boasts_of_the_wake:0 "Empty Boasts of the Wake"
 verne_empty_boasts_of_the_wake_desc:0 "Grand maritime rhetoric outpaces practical readiness, undermining naval confidence."

 # --- Overhaul Helper Tooltips ---
 verne_overhaul_tt_unlock_network_of_adventure:0 "Unlocks the reusable §YNetwork of Adventure§! helper state and related expansion tools."
 verne_overhaul_tt_unlock_sarhali_adventures:0 "Unlocks Sarhali §YAdventures§! for the overhaul mission flow."
 verne_overhaul_tt_port_of_adventure_button:0 "Enables the overhaul-facing §YPort of Adventure§! province action in valid coastal centers of trade."
 verne_overhaul_tt_port_of_adventure_button_effect:0 "Sends §Y100§! colonists to establish a frontier foothold in a random province of the selected region."
 verne_overhaul_tt_needs_6_ports_of_adventure:0 "Requires §Y6§! total Ports of Adventure in the active network."
 verne_overhaul_tt_needs_11_ports_of_adventure:0 "Requires §Y11§! total Ports of Adventure in the active network."
 verne_overhaul_tt_needs_20_ports_of_adventure:0 "Requires §Y20§! total Ports of Adventure in the active network."
 verne_overhaul_tt_in_search_akasik_or_projection:0 "Either clear §YAkasik§! of Gnollish rule, project influence there via a §Ysubject/ally§!, or prove sustained reach through your §Yadventure network/monuments§!."
 verne_overhaul_tt_in_search_expedition_capacity:0 "Field expedition capability through classic §YColonizer+Explorer§! staffing, §Ysubject/ally projection§!, or an established §Ynetwork/monument§! route."
 verne_overhaul_tt_seed_silver_oaths:0 "Seeds the §YSilver Oaths§! path and establishes Verne's first reform foundation."
 verne_overhaul_tt_seed_khenak_foundry:0 "Seeds the §YKhenak Foundry§! industrial path for later Verne overhaul content."
 verne_overhaul_tt_seed_dragonwake:0 "Seeds the §YDragonwake§! martial-dynastic path for later Verne overhaul content."
 verne_overhaul_tt_activate_dynasty_protection:0 "Activates the first durable §Ydynasty protection§! state for the Verne overhaul."
 verne_overhaul_tt_activate_marriage_court:0 "Activates the §YMarriage Court§! support state for later dynastic progression."
 verne_overhaul_tt_seed_estuary_companies:0 "Seeds the §YEstuary Companies§! maritime-finance path for the Verne overhaul."
 verne_overhaul_tt_crisis_suppressed:0 "If the §YRed Court Scandal§! is active, this mission will immediately end it."
 verne_overhaul_tt_world_network_gain:0 "Advances Verne's §YWorld Network§! — the maturity of Vernman international influence and institutional reach."
 verne_overhaul_tt_overseas_projection_gain:0 "Advances Verne's §YOverseas Projection§! — the breadth of Vernman maritime and colonial power abroad."
 verne_overhaul_tt_mature_overseas_state_gain:0 "Advances both Verne's §YWorld Network§! and §YOverseas Projection§!, deepening the mature overseas state."
 verne_overhaul_tt_dynastic_magic_machine_gain:0 "Advances Verne's §YDynastic Magic Machine§! — the integration of magecraft into the Vernman ruling apparatus."

 # --- Overhaul Decisions ---
 verne_overhaul_formalize_silver_oaths:0 "Formalize the Silver Oaths"
 verne_overhaul_formalize_silver_oaths_desc:0 "By formally codifying the Silver Oaths, Verne anchors its first reform foundation in dynastic legitimacy, court discipline, and practical statecraft."
 verne_overhaul_open_marriage_court:0 "Open the Marriage Court"
 verne_overhaul_open_marriage_court_desc:0 "With the first reform foundation secured, the ducal court can now turn toward managed marriages, line continuity, and a more deliberate dynastic machine."
 verne_overhaul_charter_khenak_talons:0 "Charter the Khenak Talons"
 verne_overhaul_charter_khenak_talons_desc:0 "The Sarhali and foundry-facing arms of Verne can be formalized into a dedicated expedition company, giving the crown a harder, more practical force for its overseas and frontier wars."
 verne_overhaul_charter_khenak_talons_tt:0 "Unlock the Khenak Talons as a Verne-exclusive mercenary company and immediately make them available for service."
 verne_overhaul_consolidate_reforged_court:0 "Consolidate the Reforged Court"
 verne_overhaul_consolidate_reforged_court_desc:0 "Having survived scandal, the crown can codify a more durable court settlement and turn hard-earned stability into a lasting administrative advantage."
 verne_overhaul_consolidate_reforged_court_tt:0 "Gain the §YReforged Court Consensus§! modifier, representing a stabilized post-crisis settlement."
 verne_overhaul_sponsor_curatorial_embassies:0 "Sponsor Curatorial Embassies"
 verne_overhaul_sponsor_curatorial_embassies_desc:0 "The Vernissage can be turned from a passive prestige machine into an active diplomatic surface, sending curated embassies and ceremonial missions abroad."
 verne_overhaul_sponsor_curatorial_embassies_tt:0 "Gain §YCuratorial Patronage§! and, if the Vernissage is already well-established, immediately recruit a bespoke Verne court advisor."
 verne_overhaul_form_harbormaster_general_staff:0 "Form a Harbormaster General Staff"
 verne_overhaul_form_harbormaster_general_staff_desc:0 "The Silver Wake's discipline can be sharpened into a permanent state command for shipping, convoy administration, and martial readiness."
 verne_overhaul_form_harbormaster_general_staff_tt:0 "Gain §YHarbormaster General Staff§! and, if necessary, unlock the §YCrimson Wake Lances§! as a ready instrument of ducal force."
 verne_overhaul_organize_pearlescent_diplomatic_corps:0 "Organize the Pearlescent Diplomatic Corps"
 verne_overhaul_organize_pearlescent_diplomatic_corps_desc:0 "The dynastic and ceremonial machinery of Verne can be made more explicit, turning prestige, marriage politics, and public culture into a sharper diplomatic instrument."
 verne_overhaul_organize_pearlescent_diplomatic_corps_tt:0 "Gain the §YPearlescent Diplomatic Corps§! and reinforce the court's world-facing ceremonial machinery."
 verne_overhaul_codify_union_court_protocols:0 "Codify Union Court Protocols"
 verne_overhaul_codify_union_court_protocols_desc:0 "If Verne is to rule through dynastic ties, those ties must be disciplined into a more formal court structure of succession, etiquette, and subject management."
 verne_overhaul_codify_union_court_protocols_tt:0 "Gain §YUnion Court Protocols§!, improving Verne's ability to manage dynastic unions and ceremonial hierarchy."
 verne_overhaul_formalize_dovesworn_partnership:0 "Formalize the Dovesworn Partnership"
 verne_overhaul_formalize_dovesworn_partnership_desc:0 "The Dovesworn Gnolls have earned their place in Verne's military tradition. Formalize the partnership and grant them a permanent seat in the Vernman court."
 verne_overhaul_formalize_dovesworn_partnership_tt:0 "Gain §YDovesworn Gnoll Partnership§!, improving cavalry power, reducing attrition, and improving tolerance of heathen cultures."
 verne_overhaul_pay_off_mage_debt:0 "Pay Off the Mage Debt"
 verne_overhaul_pay_off_mage_debt_desc:0 "The mage estate's favors made the wyvern program possible, but the debt weighs on the crown. Pay it off now and secure a stronger military-mage partnership."
 verne_overhaul_pay_off_mage_debt_tt:0 "Remove the §YIndebted to the Mages§! modifier and gain §YHonor of the Repaid Debt§!."
 verne_overhaul_levy_silver_wake_convoy:0 "Levy a Silver Wake Convoy"
 verne_overhaul_levy_silver_wake_convoy_desc:0 "The Silver Wake's disciplined maritime service can be mobilized for a period of intensive convoy operations, strengthening Verne's naval presence."
 verne_overhaul_levy_silver_wake_convoy_tt:0 "Gain §YSilver Wake Convoy Levy§!, improving light ship power and increasing sailors for 5 years."
 verne_overhaul_muster_dragonwake_cadets:0 "Muster Dragonwake Cadets"
 verne_overhaul_muster_dragonwake_cadets_desc:0 "The Dragonwake's wyvern-training tradition can be expanded to produce a new wave of rider cadets, strengthening Verne's military-mage arm."
 verne_overhaul_muster_dragonwake_cadets_tt:0 "Gain §YDragonwake Cadet Muster§!, improving cavalry power and reinforce speed for 5 years."

 # --- Overhaul Decision Modifiers ---
 verne_silver_wake_convoy_levy:0 "Silver Wake Convoy Levy"
 verne_silver_wake_convoy_levy_desc:0 "The Silver Wake's maritime service has been mobilized for intensive operations, projecting Verne's naval strength across the seas."
 verne_dragonwake_cadet_muster:0 "Dragonwake Cadet Muster"
 verne_dragonwake_cadet_muster_desc:0 "A new generation of wyvern riders has been mustered, bringing fresh discipline and shock potential to Verne's military tradition."
 verne_rogue_duchy_khenak_integration:0 "Rogue Duchy Integration"
 verne_rogue_duchy_khenak_integration_desc:0 "The Rogue Duchy's conquest has been integrated into the Khenak industrial system, boosting production and reducing construction costs."
 verne_luna_red_court_integration:0 "Luna Red Court Integration"
 verne_luna_red_court_integration_desc:0 "The Luna River Basin has been integrated into the Red Court's administrative system, strengthening Verne's domestic statecraft."
 verne_luna_diplomatic_flexibility:0 "Luna Diplomatic Flexibility"
 verne_luna_diplomatic_flexibility_desc:0 "Verne has maintained diplomatic flexibility over the Luna River Basin, preserving alliance structures and prestige abroad."

 # --- Dovesworn & Mage Debt ---
 verne_dovesworn_gnoll_partnership:0 "Dovesworn Gnoll Partnership"
 verne_dovesworn_gnoll_partnership_desc:0 "The Dovesworn Gnolls serve Verne as trusted military partners, bringing their knowledge of wyvern handling and frontier warfare to the Vernman military tradition."
 verne_mage_debt_repaid_honor:0 "Honor of the Repaid Debt"
 verne_mage_debt_repaid_honor_desc:0 "Verne has repaid its debt to the mages with honor, earning their respect and strengthening the military-mage partnership."

 # ============================================================
 # GOVERNMENT REFORMS
 # ============================================================

 # --- Doctrine & Reform Prototypes ---
 verne_proto_doctrine_ideas:0 "Verne Prototype Doctrine"
 verne_proto_doctrine_ideas_desc:0 "A cautious first doctrine draft used to validate overhaul wiring before wider doctrine rollout."
 verne_proto_doctrine_charter:0 "Prototype Doctrine Charter"
 verne_proto_doctrine_charter_desc:0 "Court-backed chartering practices give Verne a stable baseline for early doctrine experimentation."

 # --- Tier Reforms ---
 verne_court_of_silver_oaths_reform:0 "Court of Silver Oaths"
 verne_court_of_silver_oaths_reform_desc:0 "A disciplined oath-court binds dynastic legitimacy, diplomatic trust, and orderly administration into Verne's first true state foundation."
 verne_charter_of_great_captains_reform:0 "Charter of Great Captains"
 verne_charter_of_great_captains_reform_desc:0 "The ducal charter raises proven captains into a formal state estate, blending expeditionary prestige, frontier initiative, and practical command."
 verne_ducal_muster_of_armoc_reform:0 "Ducal Muster of Armoc"
 verne_ducal_muster_of_armoc_reform_desc:0 "Armoc's muster tradition turns noble military identity into a disciplined ducal war machine built around recovery, prestige, and mounted force."
 verne_admiralty_of_the_crimson_wake_reform:0 "Admiralty of the Crimson Wake"
 verne_admiralty_of_the_crimson_wake_reform_desc:0 "Verne's sea-state is entrusted to a disciplined admiralty that binds convoy command, trade projection, and fleet confidence into a single maritime doctrine of rule."
 verne_estuary_companies_of_heartspier_reform:0 "Estuary Companies of Heartspier"
 verne_estuary_companies_of_heartspier_reform_desc:0 "Heartspier's estuarine financiers and port companies turn maritime administration into commercial leverage, cheaper building, and steadier credit."
 verne_regatta_discipline_reform:0 "Regatta Discipline"
 verne_regatta_discipline_reform_desc:0 "The Regatta becomes more than prestige spectacle: it codifies sailor culture, maritime readiness, and practical seamanship across the Vernman coast."
 verne_red_court_arcana_reform:0 "Red Court Arcana"
 verne_red_court_arcana_reform_desc:0 "The Red Court is formalized as a state-bearing institution, integrating mage influence, advisor depth, and dynastic shaping into the machinery of rule."
 verne_dragonwake_ordinance_reform:0 "Dragonwake Ordinance"
 verne_dragonwake_ordinance_reform_desc:0 "Wyvern service and martial dynastic training are codified into an ordinance that prizes shock leadership, officer tradition, and battlefield discipline."
 verne_battle_mage_collegium_reform:0 "Battle-Mage Collegium"
 verne_battle_mage_collegium_reform_desc:0 "Evocation doctrine and officer training are fused into a single war-collegium, giving Verne a harder striking field army and a deeper mage-officer bench."
 verne_charter_of_the_vernissage_reform:0 "Charter of the Vernissage"
 verne_charter_of_the_vernissage_reform_desc:0 "The Vernissage is elevated into a state-bearing court institution, turning magnificence, administration, and prestige into a deliberate machine of rule."
 verne_hall_of_distant_horizons_reform:0 "Hall of Distant Horizons"
 verne_hall_of_distant_horizons_reform_desc:0 "Verne's overseas doctrine is formalized around long-range movement, diplomatic reach, and practical infrastructure for sustained projection abroad."
 verne_vernissage_secretariat_reform:0 "Vernissage Secretariat"
 verne_vernissage_secretariat_reform_desc:0 "What began as spectacle becomes bureaucracy: a secretariat of exhibitions, correspondence, and worldly administration that binds prestige to practical governance."
 verne_wyvern_marshalate_reform:0 "Wyvern Marshalate"
 verne_wyvern_marshalate_reform_desc:0 "The wyvern-rider corps is raised into a true marshalate, organizing noble riders, officer tradition, and disciplined reinforcement under ducal authority."
 verne_crimson_eyrie_commandery_reform:0 "Crimson Eyrie Commandery"
 verne_crimson_eyrie_commandery_reform_desc:0 "Verne's wyvern infrastructure and martial orders are folded into a commandery system that lowers upkeep and expands state-directed mounted force."
 verne_sea_nest_ascendancy_reform:0 "Sea-Nest Ascendancy"
 verne_sea_nest_ascendancy_reform_desc:0 "Wyvern doctrine and sea power are fused into an expeditionary air-sea state, emphasizing maneuver, fleet reach, and fast-strike projection."
 verne_secretariat_of_the_grand_regatta_reform:0 "Secretariat of the Grand Regatta"
 verne_secretariat_of_the_grand_regatta_reform_desc:0 "The Grand Regatta becomes an institution of maritime reputation, commercial coordination, and world-facing logistics rather than merely a display of splendor."
 verne_imperial_sea_court_reform:0 "Imperial Sea Court"
 verne_imperial_sea_court_reform_desc:0 "Verne's diplomatic and naval prestige are fused into an imperial sea court that projects legitimacy abroad as reliably as fleets project force."
 verne_overseas_commanderies_reform:0 "Overseas Commanderies"
 verne_overseas_commanderies_reform_desc:0 "Strategic enclaves abroad are formalized into commanderies, giving Verne a more durable subject-and-enclave model for overseas power."
 verne_apostolic_court_of_corin_reform:0 "Apostolic Court of Corin"
 verne_apostolic_court_of_corin_reform_desc:0 "The Verne court becomes an apostolic institution of Corinite rule, blending missionary strength, diplomatic authority, and religious enforcement."
 verne_vernman_court_of_the_world_reform:0 "Vernman Court of the World"
 verne_vernman_court_of_the_world_reform_desc:0 "Prestige, commerce, diplomacy, and worldly attraction are drawn into one great cosmopolitan court that seeks to make Verne the center of Halann's gaze."
 verne_knights_of_the_crimson_scale_reform:0 "Knights of the Crimson Scale"
 verne_knights_of_the_crimson_scale_reform_desc:0 "Corinite militancy and knightly tradition are reorganized into an order-minded state arm that joins piety, warlike prestige, and disciplined service."
 verne_throne_of_the_wyvern_kings_reform:0 "Throne of the Wyvern-Kings"
 verne_throne_of_the_wyvern_kings_reform_desc:0 "Verne's final dynastic synthesis crowns military excellence, naval confidence, and war-mage kingship in a single supreme throne-state."
 verne_the_crimson_world_order_reform:0 "The Crimson World-Order"
 verne_the_crimson_world_order_reform_desc:0 "Global commerce, imperial administration, and diplomatic reach are fused into a singular world-order centered on Verne's maritime empire."
 verne_storm_crowned_hegemony_reform:0 "Storm-Crowned Hegemony"
 verne_storm_crowned_hegemony_reform_desc:0 "This final hegemonic form exalts Verne as a storm-crowned military and oceanic power, joining land supremacy with fleet-borne dominion."

 # ============================================================
 # ADVISOR LAYER
 # ============================================================

 verne_harbormaster_of_the_silver_wake:0 "Harbormaster of the Silver Wake"
 verne_harbormaster_of_the_silver_wake_desc:0 "A senior harbour administrator of the Silver Wake tradition, equally concerned with ledgers, pilots, convoy discipline, and the political theater of maritime trust."
 verne_curator_of_the_vernissage:0 "Curator of the Vernissage"
 verne_curator_of_the_vernissage_desc:0 "This courtly organizer shapes exhibitions, audiences, and diplomatic encounters into instruments of prestige and statecraft."
 verne_master_of_the_khenak_foundries:0 "Master of the Khenak Foundries"
 verne_master_of_the_khenak_foundries_desc:0 "A hard practical mind of furnaces, powder, and iron accounts, charged with turning foundry discipline into state strength."
 verne_magister_of_the_red_court:0 "Magister of the Red Court"
 verne_magister_of_the_red_court_desc:0 "A senior Red Court official who binds arcane administration, dynastic cultivation, and court procedure into one scarlet machine."
 verne_wyvern_marshal:0 "Wyvern Marshal"
 verne_wyvern_marshal_desc:0 "Part knight-captain, part ducal war planner, the Wyvern Marshal stands at the meeting point of noble service, aerial doctrine, and battlefield prestige."

 # --- Advisor Events ---
 verne_overhaul_appoint_court_advisor:0 "Appoint a Court Specialist"
 verne_overhaul_appoint_court_advisor_desc:0 "Verne's growing institutions can now call a specialized court figure into service, drawing on the active lane that the realm has cultivated most successfully."
 verne_overhaul_appoint_court_advisor_tt:0 "A dedicated Verne court event will offer one of several bespoke advisors tied to your currently developed state lanes."
 verne_overhaul_advisor.1.t:0 "A Specialist for the Ducal Court"
 verne_overhaul_advisor.1.d:0 "The institutions now growing around the Vernman court have matured enough to present real specialists for ducal service. Whether we lean toward harbor discipline, worldly display, red-court administration, foundry rigor, or wyvern command, one of these figures could give the state sharper shape."
 verne_overhaul_advisor.1.a:0 "Summon a Harbormaster of the Silver Wake"
 verne_overhaul_advisor.1.b:0 "Invite a Curator of the Vernissage"
 verne_overhaul_advisor.1.c:0 "Commission a Master of the Khenak Foundries"
 verne_overhaul_advisor.1.d_wyvern:0 "Raise up a Wyvern Marshal"
 verne_overhaul_advisor.1.e:0 "Appoint a Magister of the Red Court"
 verne_overhaul_advisor.2.t:0 "The Khenak Officer Corps"
 verne_overhaul_advisor.2.d:0 "Verne's expeditionary and foundry interests in the Khenak have matured enough to demand a more specialized command cadre. We can lean into a harder logistical-industrial program or sharpen the wyvern-service arm of the state."
 verne_overhaul_advisor.2.a:0 "Elevate a Khenak master of logistics"
 verne_overhaul_advisor.2.b:0 "Promote a field-tested wyvern commander"
 verne_overhaul_advisor.3.t:0 "Masters of the Grand Vernissage"
 verne_overhaul_advisor.3.d:0 "The Vernissage has grown beyond a gallery and into a true engine of state prestige. Its senior figures now compete to define the next stage of Verne's public culture: a curator of worldly splendor, or a magister able to bind ceremony more tightly to the machinery of rule."
 verne_overhaul_advisor.3.a:0 "Raise up a grand curator of the Vernissage"
 verne_overhaul_advisor.3.b:0 "Elevate a magister of ceremonial rule"
 verne_overhaul_advisor.4.t:0 "The Dovesworn Compact"
 verne_overhaul_advisor.4.d:0 "The Dovesworn Gnolls have proven themselves loyal and capable allies. Their riders know the wyvern nest grounds better than most Vernman officers. Shall we formalize this partnership and grant them a permanent place in Verne's military tradition?"
 verne_overhaul_advisor.4.a:0 "Formalize the Dovesworn partnership"
 verne_overhaul_advisor.4.b:0 "Maintain a lighter relationship"
 verne_overhaul_advisor.5.t:0 "The Debt Repaid"
 verne_overhaul_advisor.5.d:0 "The mage estate has finally been paid back for the favors that made the wyvern program possible. Verne's military tradition stands on firmer ground, and the mages know it."
 verne_overhaul_advisor.5.a:0 "Honor the mages with a public ceremony"
 verne_overhaul_advisor.5.b:0 "Quietly acknowledge the debt and move on"
 verne_overhaul_advisor.6.t:0 "The Luna River Question"
 verne_overhaul_advisor.6.d:0 "The Luna River Basin is now under Verne's influence. Shall we integrate it fully into the Red Court's administrative machinery, or maintain the diplomatic flexibility of the old alliance structure?"
 verne_overhaul_advisor.6.a:0 "Integrate into the Red Court"
 verne_overhaul_advisor.6.b:0 "Maintain diplomatic flexibility"

 # --- Red Court Mage Recruitment Event ---
 verne_overhaul_advisor.100.t:0 "A Mage for the Red Court"
 verne_overhaul_advisor.100.d:0 "The Red Court's growing arcane apparatus now commands enough prestige and resources to attract a skilled mage-advisor. This specialist could sharpen our governance through magical insight, dynastic cultivation, or battlefield preparation."
 verne_overhaul_advisor.100.a:0 "Recruit a court mage"
 verne_overhaul_advisor.100.b:0 "Seek a war-mage instructor"
 verne_overhaul_advisor.100.c:0 "Pass for now"

 # ============================================================
 # MERCENARY COMPANIES
 # ============================================================

 merc_crimson_wake_lances:0 "Crimson Wake Lances"
 merc_crimson_wake_lances_mercenary_desc:0 "An order-host of crimson-bannered Vernman lancers, formed around Corinite martial patronage and disciplined aerial cavalry doctrine. They fight as a prestige arm of the realm's militant devotional state."
 merc_heartspier_skyguard:0 "Heartspier Skyguard"
 merc_heartspier_skyguard_mercenary_desc:0 "Drawn from veteran wyvernrider cadres and harbor-watch command, the Heartspier Skyguard serve as Verne's fast-striking elite, equally suited to guarding the gulf and breaking an enemy line."
 merc_khenak_talons:0 "Khenak Talons"
 merc_khenak_talons_mercenary_desc:0 "These expedition-forged companies marry Khenak's harder campaigning culture with Vernman mobility, fielding a practical composite force of riders, gunners, and seasoned march officers."

 # ============================================================
 # LILIAC WAR LEGACY EVENTS & MODIFIERS
 # ============================================================

 # --- Missions ---
 A33_recount_liliac_defeat_title:0 "Recount the Liliac War Legacy"
 A33_recount_liliac_defeat_desc:0 "The Liliac War — Verne's greatest military humiliation — left deep scars on the Silver Court's psyche. Confronting this legacy, whether through diplomacy or martial resolve, is the first step toward Verne's future identity."
 A33_seek_eastern_allies_title:0 "Seek Eastern Allies"
 A33_seek_eastern_allies_desc:0 "Verne's Liliac legacy could become diplomatic capital. Building bridges with eastern neighbors transforms a history of defeat into a present of pragmatism."
 A33_avenge_liliac_wars_title:0 "Avenge the Liliac War"
 A33_avenge_liliac_wars_desc:0 "The Liliac War left Verne's martial pride wounded. Claims on the contested territories, military alliances, and the willingness to fight — these are the instruments of a Verne willing to right old wrongs."
 A33_unity_through_diplomacy_title:0 "Unity Through Diplomacy"
 A33_unity_through_diplomacy_desc:0 "Whether through diplomatic recovery or martial vengeance, Verne's Liliac legacy has been transformed. The Silver Court now stands as a beacon of diplomatic pragmatism, turning past humiliation into present authority."

 # --- Liliac Events ---
 verne_liliac.1.t:0 "The Liliac War Legacy"
 verne_liliac.1.d:0 "The court remembers the Liliac War — Verne's defeat, the loss of prestige, the humiliation of the silver banners. Shall we confront this wound and rebuild, or let it harden us into something fiercer?"
 verne_liliac.1.a:0 "Confront the wound and rebuild"
 verne_liliac.1.b:0 "Let the defeat forge our resolve"
 verne_liliac.2.t:0 "Eastern Diplomatic Offer"
 verne_liliac.2.d:0 "Verne's legacy of defeat could become a legacy of diplomatic pragmatism. Shall we reach out to our eastern neighbors with offers of alliance, trade, and shared security?"
 verne_liliac.2.a:0 "Pursue diplomatic recovery"
 verne_liliac.2.b:0 "Focus on domestic consolidation"
 verne_liliac.3.t:0 "The Demand for Vengeance"
 verne_liliac.3.d:0 "The Liliac War left scars on Verne's martial pride. The military is ready to channel that old grievance into a more aggressive posture — claims, alliances, and the willingness to fight."
 verne_liliac.3.a:0 "Channel the grievance into military strength"
 verne_liliac.3.b:0 "Let the grievance fade into history"
 verne_liliac.4.t:0 "Unity Through Diplomacy"
 verne_liliac.4.d:0 "Verne's Liliac legacy — whether of defeat or vengeance — has been transformed into something greater. The Silver Court now projects legitimacy through sustained diplomatic effort, turning past humiliation into present authority."
 verne_liliac.4.a:0 "Verne endures and thrives"

 # --- Liliac Modifiers ---
 verne_liliac_war_scarred:0 "Liliac War Scars"
 verne_liliac_war_scarred_desc:0 "The memory of the Liliac War still weighs on the military. Morale is lower and discipline suffers from the lingering humiliation."
 verne_liliac_war_vengeful:0 "Liliac War Vengeance"
 verne_liliac_war_vengeful_desc:0 "The memory of the Liliac War has hardened Verne's resolve. Soldiers fight fiercer, willing to sacrifice more for a potential victory."
 verne_liliac_diplomatic_recovery:0 "Liliac Diplomatic Recovery"
 verne_liliac_diplomatic_recovery_desc:0 "Verne has turned its Liliac War legacy into diplomatic advantage, building bridges where others might build walls."
 verne_liliac_martial_fury:0 "Liliac Martial Fury"
 verne_liliac_martial_fury_desc:0 "The memory of the Liliac War drives Verne's military to greater discipline and shock potential, willing to fight harder for every inch."
 verne_liliac_unity_through_diplomacy:0 "Unity Through Diplomacy"
 verne_liliac_unity_through_diplomacy_desc:0 "Verne's Liliac legacy has become a beacon of diplomatic pragmatism, turning past humiliation into present authority and sustained legitimacy."

 # ============================================================
 # RED COURT SCANDAL — CRISIS EVENTS & MODIFIERS
 # ============================================================

 verne_overhaul_crisis.1.t:0 "The Red Court Scandal"
 verne_overhaul_crisis.1.d:0 "Whispers of mismanaged dynastic patronage, factional court favor, and Silver Wake resentment now spill into the open. Verne's statecraft has grown ambitious enough that its failures can no longer be hidden behind ceremony."
 verne_overhaul_crisis.1.a:0 "The court reels under the blow"
 verne_overhaul_crisis.2.t:0 "A Question of Succession and Oaths"
 verne_overhaul_crisis.2.d:0 "Critics of the Red Court now question whether the dynasty's magical and marital machinery truly serves the realm, or merely shields the court from its own errors."
 verne_overhaul_crisis.2.a:0 "Let the accusations spread"
 verne_overhaul_crisis.2.b:0 "Reassert dynastic discipline"
 verne_overhaul_crisis.3.t:0 "Fractures in the Vernman Compact"
 verne_overhaul_crisis.3.d:0 "Merchants, captains, and noble households now demand visible concessions. Without a more ordered settlement, Verne's authority may curdle into a lasting crisis of reputation."
 verne_overhaul_crisis.3.a:0 "Endure the diplomatic embarrassment"
 verne_overhaul_crisis.3.b:0 "Buy time and formalize the court"
 verne_overhaul_crisis.4.t:0 "Silver Wake Petitions"
 verne_overhaul_crisis.4.d:0 "Captains, harbor officers, and oath-bound notables now demand that the court prove it still serves the disciplined Vernman compact rather than merely sheltering factional favorites."
 verne_overhaul_crisis.4.a:0 "Answer them with visible service"
 verne_overhaul_crisis.4.b:0 "Smother the petition quietly"
 verne_overhaul_crisis.5.t:0 "The Red Court Demands a Sacrifice"
 verne_overhaul_crisis.5.d:0 "The Magisters insist that the scandal can still be contained, but only if the crown accepts a painful concession—either administrative embarrassment or military disruption—to preserve the larger machine."
 verne_overhaul_crisis.5.a:0 "Pay the administrative price"
 verne_overhaul_crisis.5.b:0 "Divert military effort instead"
 verne_overhaul_crisis.100.t:0 "The Court Stabilized"
 verne_overhaul_crisis.100.d:0 "The worst of the scandal has passed. Verne's court remains ambitious and dangerous, but it has emerged more disciplined, more explicit, and better prepared to bear the weight of its own institutions."
 verne_overhaul_crisis.100.a:0 "The realm endures"

 # ============================================================
 # SILVER WAKE EVENTS
 # ============================================================

 verne_overhaul_oaths.1.t:0 "The Silver Oaths Awaken"
 verne_overhaul_oaths.1.d:0 "The ancient Silver Oaths — binding contracts enforced by magical courts — stir once more. Verne's diplomats sense an opportunity to formalize these arcane pacts into a system that could reshape the realm's foreign relations for generations."
 verne_overhaul_oaths.1.a:0 "Embrace the Silver Oaths"
 verne_overhaul_oaths.1.b:0 "Study them cautiously"
 verne_overhaul_oaths.2.t:0 "The Court of Oaths Convenes"
 verne_overhaul_oaths.2.d:0 "With the Silver Oaths formally recognized, the first session of the Court of Oaths is ready to begin. This institution will bind Verne's allies and subjects through arcane contract, enforcing loyalty through magical law."
 verne_overhaul_oaths.2.a:0 "Open the Court with ceremony"
 verne_overhaul_oaths.2.b:0 "Begin quietly with test cases"
 verne_overhaul_oaths.3.t:0 "The First Arbitration"
 verne_overhaul_oaths.3.d:0 "The Court of Oaths faces its first true test: a dispute between a Verne subject and an allied power. The Silver Oaths demand resolution — and the duke's verdict carries the weight of arcane law."
 verne_overhaul_oaths.3.a:0 "Rule in favor of the subject"
 verne_overhaul_oaths.3.b:0 "Seek a balanced compromise"
 verne_overhaul_oaths.3.c:0 "Defer to the ally's claim"

 # ============================================================
 # DYNASTY EVENTS
 # ============================================================

 verne_overhaul_dynasty.1.t:0 "The Dynastic Safeguard"
 verne_overhaul_dynasty.1.d:0 "Verne's throne faces uncertainty — whether through a vacant heir or faltering legitimacy. The court moves to enact the Dynastic Safeguard, a set of ancient protections designed to prevent the realm from collapsing into succession chaos."
 verne_overhaul_dynasty.1.a:0 "Enact the Safeguard immediately"
 verne_overhaul_dynasty.1.b:0 "Delay and negotiate with the nobles"

 # ============================================================
 # BATTLE MAGE COLLEGIUM EVENT CHAIN
 # ============================================================

 verne.200.t:0 "The Battle Mage Collegium Opens"
 verne.200.d:0 "The Battle Mage Collegium is ready to accept its first cadets. Evocation-trained officers will fuse arcane power with battlefield command, giving Verne's army a devastating new edge. But the Collegium demands resources and commitment."
 verne.200.a:0 "Fund the Collegium generously"
 verne.200.b:0 "Start with a modest program"
 verne.200.c:0 "Redirect the budget elsewhere"

 # ============================================================
 # HOLY ORDER EVENTS
 # ============================================================

 verne_holy_order.1.t:0 "A New Holy Order"
 verne_holy_order.1.d:0 "The faithful of Verne petition the court for permission to found a new holy order in Corin's name. This small but devoted brotherhood would serve the state through prayer, discipline, and arms."
 verne_holy_order.1.a:0 "Charter the holy order"
 verne_holy_order.1.b:0 "Decline — we need soldiers, not monks"
 verne_holy_order.1.c:0 "Offer limited support"

 # ============================================================
 # DOCTRINE IDEAS — SILVER WAKE
 # ============================================================

 verne_doctrine_silver_wake:0 "Doctrine of the Silver Wake"
 verne_doctrine_silver_wake_desc:0 "This doctrine binds Verne's ducal court, captains, and quayside guilds into one practical maritime system: account carefully, sail consistently, arbitrate quickly, and profit without overstraining the realm."
 verne_doctrine_silver_wake_start:0 "Foundations of the Silver Wake"
 verne_doctrine_silver_wake_start_desc:0 "Our first duty is to keep dependable crews at sea in every season, so that doctrine remains a daily practice rather than a ceremonial boast."
 verne_doctrine_silver_wake_bonus:0 "Silver Wake Finisher"
 verne_doctrine_silver_wake_bonus_desc:0 "By unifying crown ledgers and captaincy custom, Verne can move goods more efficiently across every established route."
 verne_doctrine_silver_wake_harbor_ledgers:0 "Harbor Ledgers"
 verne_doctrine_silver_wake_harbor_ledgers_desc:0 "Standardized port ledgers reduce leakages and help ducal tax officers track maritime revenue with fewer disputes."
 verne_doctrine_silver_wake_tide_charts:0 "Tide Charts of Verne"
 verne_doctrine_silver_wake_tide_charts_desc:0 "Shared coastal charting routines let each new generation of officers inherit practical seamanship rather than relearn it."
 verne_doctrine_silver_wake_marine_rotations:0 "Marine Rotations"
 verne_doctrine_silver_wake_marine_rotations_desc:0 "Crew rotations and dockside rationing plans lower long-term upkeep strain on the fleet payroll."
 verne_doctrine_silver_wake_convoy_discipline:0 "Convoy Discipline"
 verne_doctrine_silver_wake_convoy_discipline_desc:0 "Procurement rules and common hull standards make escort squadrons cheaper to field and easier to replace."
 verne_doctrine_silver_wake_prize_law:0 "Prize Law Codex"
 verne_doctrine_silver_wake_prize_law_desc:0 "A clearer legal path for captured ships encourages captains to seize enemy vessels intact whenever possible."
 verne_doctrine_silver_wake_captains_compact:0 "Captains' Compact"
 verne_doctrine_silver_wake_captains_compact_desc:0 "Recognized captaincy privileges create a disciplined officer corps that foreign courts increasingly trust."
 verne_doctrine_silver_wake_quayside_arbitration:0 "Quayside Arbitration"
 verne_doctrine_silver_wake_quayside_arbitration_desc:0 "Fast harbor arbitration settles merchant conflicts before they spill into wider unrest at home."

 # ============================================================
 # DOCTRINE IDEAS — VERNISSAGE
 # ============================================================

 verne_doctrine_vernissage:0 "Vernissage Ideas"
 verne_doctrine_vernissage_desc:0 "Adventure, courtly display, and overseas projection are woven together into a prestige-state doctrine of discovery, spectacle, and contact."
 verne_doctrine_vernissage_captains:0 "Captains of the Vernissage"
 verne_doctrine_vernissage_captains_desc:0 "The Vernissage sponsors a culture of prestige expeditions led by captains who turn court patronage into real overseas reach."
 verne_doctrine_vernissage_ports_of_adventure:0 "Ports of Adventure"
 verne_doctrine_vernissage_ports_of_adventure_desc:0 "A network of adventure ports and expedition harbours accelerates Vernman communications abroad."
 verne_doctrine_vernissage_heartspier_scale:0 "The Heartspier Scale"
 verne_doctrine_vernissage_heartspier_scale_desc:0 "Heartspier's prestige gives Verne a stronger hand in negotiations and curated displays of worldly power."
 verne_doctrine_vernissage_eastern_princes:0 "Eastern Princes' Correspondence"
 verne_doctrine_vernissage_eastern_princes_desc:0 "Letters, exhibitions, and princely exchanges turn prestige into long-distance political leverage."
 verne_doctrine_vernissage_expedition_ledgers:0 "Expedition Ledgers"
 verne_doctrine_vernissage_expedition_ledgers_desc:0 "Systematic bookkeeping of voyages and returns turns exploration into a disciplined state art."
 verne_doctrine_vernissage_regatta_laurels:0 "Regatta Laurels"
 verne_doctrine_vernissage_regatta_laurels_desc:0 "Maritime triumphs become part of the Vernissage itself, feeding state prestige back into the sailor economy."
 verne_doctrine_vernissage_worlds_on_display:0 "Worlds on Display"
 verne_doctrine_vernissage_worlds_on_display_desc:0 "The Vernissage becomes a worldly institution where commerce, prestige, and global curiosity are displayed as one."

 # ============================================================
 # DOCTRINE IDEAS — DRAGONWAKE
 # ============================================================

 verne_doctrine_dragonwake:0 "Dragonwake Ideas"
 verne_doctrine_dragonwake_desc:0 "The Dragonwake doctrine raises wyvern nobility and martial dynastic discipline into a coherent doctrine of shock, professionalism, and aerial command."
 verne_doctrine_dragonwake_sky_lance_discipline:0 "Sky-Lance Discipline"
 verne_doctrine_dragonwake_sky_lance_discipline_desc:0 "Wyvern riders are drilled as an elite lance arm rather than a merely ceremonial aristocratic corps."
 verne_doctrine_dragonwake_muster:0 "The Dragonwake Muster"
 verne_doctrine_dragonwake_muster_desc:0 "Wyvern service is formalized into a recurring muster that deepens tradition and strengthens the officer class."
 verne_doctrine_dragonwake_aerial_reconnaissance:0 "Aerial Reconnaissance"
 verne_doctrine_dragonwake_aerial_reconnaissance_desc:0 "The Dragonwake gives Verne a rare capacity for battlefield maneuver and observation from above."
 verne_doctrine_dragonwake_storm_crowned_nobility:0 "Storm-Crowned Nobility"
 verne_doctrine_dragonwake_storm_crowned_nobility_desc:0 "The wyvern nobility is transformed into a more disciplined and professional military estate."
 verne_doctrine_dragonwake_red_wake_shock:0 "Red Wake Shock Doctrine"
