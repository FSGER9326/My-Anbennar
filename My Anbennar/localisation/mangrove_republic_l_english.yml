# events
 mangrove.0.t: "The Taga'ala Mangrove Republics"
 mangrove.0.d: "We are corrupt and smell.\nRegional mechanics: Mangrove Influence and Biological Infrastructure Province Button.\nCheck the Mangrove Influence decision for more info."
 mangrove.0.a: "Proceed"

 mangrove.2.t: "The Long Quiet"
 mangrove.2.d: "The mangroves do not appreciate your attempt to circumvent the restrictions of conquest."
 mangrove.2.a: "Stick to the restricted casus belli. Report on Discord if this is a bug."

 mangrove.3.t: "Donate to the Reclamation Efforts"
 mangrove.3.d: "The Reclamation Site is in need of support. Donate to the reclamation efforts and improve your standing among the republics."
 mangrove_donate_tt: "\nEvery 3 donations will increase the §Ystarting development§! of the Reclamation Site province. Donations will also increase §GMangrove Influence§!. The Republics have currently donated §Y[mangrove_target_province.mangrove_donations.GetValue] time(s)§!.\n\nOur Current Mangrove Influence: §G[Root.mangrove_influence.GetValue]§!\nMost Influential Mangrove Republic other than ourselves: §G[mangrove_highest_other.GetName]§!\nTheir Mangrove Influence: §G[mangrove_highest_other.mangrove_influence.GetValue]§!"
 mangrove.3.a: "Increase Development Efforts"
 mangrove.3.b: "Send Settlers"
 mangrove.3.e: "Donate Money"
 mangrove.3.f: "Back Out"
 mangrove_donate_manpower_tt: "Lose §R-[Root.mangrove_manpower_check.GetValue]000§! Manpower."
 mangrove_donate_money_tt: "Lose §R-[Root.mangrove_money_check.GetValue]§! Crowns."

 mangrove.5.t: "You Must Construct Additional Punia Logi"
 mangrove.5.d: "Punia Logi require cooperation and a strong foundation. And money doesn't hurt."
 mangrove_punia_logi_compare_info_tt: "Our Punia Logi: §G[Root.mangrove_punia_logi.GetValue]§!\nMangrove Republic with most Punia Logi other than ourselves: §G[mangrove_highest_other.GetName]§!\nTheir Punia Logi: §G[mangrove_highest_other.mangrove_punia_logi.GetValue]§!"
 mangrove.5.a: "This is going to cost us."
 mangrove.5.b: "Our allies stay loyal by our side."
 mangrove.5.c: "Biological Infrastructure serves as a fine foundation."
 mangrove.5.e: "Back Out"

 mangrove.101.t: "Pokemon go to the polls"
 mangrove_vote_tt: "Voting Power is §GMangrove Influence + 4 * Diplomatic Reputation§!.\nCurrent Voting Power: §G[Root.mangrove_true_influence.GetValue]§!"
 mangrove.101.d: "Vote for the next hinuimangrove to be reclaimed."
 mangrove.101.a: "Toe Afe Matagi"
 mangrove.101.b: "Fugalaulu"
 mangrove.101.c: "Lele La'au"
 mangrove.101.e: "Vasanifo"
 mangrove.101.f: "Tatau"
 mangrove.101.g: "La 'imo'imo"
 mangrove.101.h: "A'au Lafiga"

 mangrove.1020.t: "Investing into Production Methods"
 mangrove.1020.d: "The reclamation is going well. The mangroves hold many valuable resources, but producing them will require us to build a solid foundation."
 mangrove.1020.a: "It is worth the investment."
 mangrove.1020.b: "Just harvest whatever the land provides."
 mangrove_high_investment_tt: "The mangrove will produce more valuable trade goods."
 mangrove_low_investment_tt: "The mangrove will produce less valuable trade goods."

 mangrove.1021.t: "Dispute over Production"
 mangrove.1021.d: "The reclamation site is almost finished and soon ready to begin production. However, the Mangrove Republics cannot agree on which resource the reclaimed mangrove should produce. They refuse to send their workers unless they can have input on the production method. If we do not wish to bow to the whims of our kin, we could divert our settlers to man the production facilities ourselves."
 mangrove.1021.a: "Salt"
 mangrove.1021.b: "Pearls and Amber"
 mangrove.1021.c: "Ivory"
 mangrove.1021.e: "Dyes"
 mangrove.1021.f: "Fish"
 mangrove.1021.g: "Naval Supplies"
 mangrove.1021.h: "Lumber"
 mangrove.1021.i: "Heed our kin."

 mangrove.103.t: "A New Reclamation Target"
 mangrove.103.d: "The votes have been tallied and the result is in. [mangrove_target_province.GetName] is the next mangrove to be reclaimed!"
 mangrove.103.a: "The Reclamation begins anew."
 mangrove_reclamation_tt: "§G[mangrove_leader.GetName]§! is the most influential and will hold the province. Changing leaders will change ownership of the province.\n\n§GReclamation will last for 5 years.§!"

 mangrove.105.t: "[mangrove_reclaimed_permanently.GetName] Reclaimed"
 mangrove.105.d: "[mangrove_reclaimed_permanently.GetName] has been fully reclaimed from the wilds. Recovering from the settlement efforts, the republics now focus inwards."
 mangrove.105.a: "Focus Inward"
 mangrove_inward_focus_tt: "§G[mangrove_reclaimed_permanently.Owner.GetName]§! loses §Y10§! Mangrove Influence and will maintain permanent ownership of this province. The Reclamation has ended and now we focus inwards.\n\n§GInward Focus§! will last for 2 years. You may shorten this period by taking the decision §GShift Focus.§!"

 mangrove.107.t: "Outward Focus"
 mangrove.107.d: "This period of Inward Focus has come to an end. The Reclamation will soon begin once more!"
 mangrove.107.a: "About time."

 mangrove.109.t: "Vying For Dominance"
 mangrove.109.d: "The Taga'ala mangroves have been fully reclaimed. The question of consolidation has been raised among the republics. Amongst the murmurs in the mangroves, we have caught wind of their intentions. [mangrove_vying_custom_loca]"
 mangrove_vying_custom_loca_dip: "The republics plan on unifying diplomatically."
 mangrove_vying_custom_loca_mil: "The republics plan on unifying militarily."
 mangrove.109.a: "This is fine."
 mangrove.109.b: "Maybe the others will accept a different path..."
 mangrove_largest_tag_explain_tt: "We will follow the path chosen by the §Ylargest republic§!."
 mangrove_dip_vying_pre_explain_tt: "We will have §Y10§! years to build the most beautiful §YPunia Logi§!. This will require §Ymoney§!, §YBiological Infrastructure§!, and §Yalliances§!. The winner will §Yintegrate§! the others."
 mangrove_mil_vying_pre_explain_tt: "We will fight against the republic with the §Ymost development§!. There will be a §Y3§! year period to convince the other republics to join a side. Increase their §Gopinion§! and §Gtrust§! to convince them."
 mangrove_vying_swap_dip_tt: "We will pivot to the §YDiplomatic§! path of §YVying for Dominance§!."
 mangrove_vying_swap_mil_tt: "We will pivot to the §YMilitary§! path of §YVying for Dominance§!."

 mangrove.111.t: "Vying for Dominance Commences!"
 mangrove.111.d.dip: "The Vying for Dominance has officially begun. The Republics have chosen the Diplomatic path."
 mangrove.111.d.mil: "The Vying for Dominance has officially begun. The Republics have chosen the Military path."
 mangrove.111.a: "Let the others see why we are the best!"
 mangrove_dip_vying_tt: "We have §Y10§! years to build the most beautiful §YPunia Logi§!. This will require §Ymoney§!, §YBiological Infrastructure§!, and §Yalliances§!. The winner will §Yintegrate§! the others.\n§YPunia Logi§! can be seen in the §GMangrove Influence§! decision."
 mangrove_mil_vying_tt: "§G[mangrove_side_1.GetName]§! will be fighting against §G[mangrove_side_2.GetName]§!. There will be a §Y3§! year period to convince the other republics to join a side. Increase their §Gopinion§! and §Gtrust§! to convince them."

 mangrove.114.t: "War of Unification"
 mangrove.114.d: "The Mangrove Republics have made their choices and chose their sides. Now we go to war!"
 mangrove.114.a: "Only one will remain."
 mangrove_unification_war_tt: "We have §Y7§! years to prove our dominance and §YUnify the Mangroves§!. If time runs out, the country with §Yhigher warscore§! will claim victory."

 mangrove.115.t: "The Taga'ala Mangrove Republics United!"
 mangrove.115.d: "The war has come to an end. We have bested the other republic and proven our strength. The limitations of war and conquest have been lifted. Now, we turn our focus to the rest of Insyaa."
 mangrove.115.a: "A new age begins!."
 mangrove_vying_mil_reward_tt: "Gain §Y1§! §Gfree Biological Infrastructure upgrade§! on all provinces from the republics swayed before the war."

 mangrove.117.t: "An Inconclusive Competition"
 mangrove.117.d: "There is no conclusive winner among the Mangrove Republics. Many complaints and grumbling is heard in the mangroves. The conclusion to this competition has been pushed back two years. It will not be pushed back again."
 mangrove.117.a: "The end is close."
 mangrove_punia_logi_warning_tt: "We will convene in §Y2§! years. If there is a tie again, the republics will §Ychoose randomly§! from the tied."

 mangrove.118.t: "The Taga'ala Mangrove Republics United!"
 mangrove.118.d: "We have built the most Punia Logi. Their beauty and glory stand as a testament to our influence and care. The mangroves have been united under our control. The limitations of war and conquest have been lifted. Now, we turn our focus to the rest of Insyaa."
 mangrove.118.a: "A new age begins!."
 mangrove_vying_dip_reward_tt: "Gain §Y1§! §Gfree Biological Infrastructure upgrade§! on all annexed provinces."

 mangrove.120.t: "The Splitting of the Mangroves"
 mangrove.120.d: "The republics have agreed to an uneasy peace. The mangroves have split into two."
 mangrove.120.a: "Unification was a dream borne of folly."

 mangrove.122.t: "An Outsider has Encroached on the Mangroves"
 mangrove.122.d: "The target site of the Reclamation has been claimed by an outsider. This Reclamation is canceled early. Everyone go home."
 mangrove.122.a: "Grrrrr. They're lucky that we are a peace-loving folk."

 mangrove.123.t: "A New Mangrove Leader"
 mangrove.123.d: "[mangrove_leader.GetName] has spread their influence among the mangroves. They are now the new leader of the mangroves."
 mangrove.123.a: "Interesting."
 mangrove.123.b: "I don't much care for this."
 mangrove_disable_new_leader_event_tt: "Disable this event from popping up again."

 mangrove.201.t: "We messed up"
 mangrove.201.d: "We made an oopsie. The other republics all saw it and made fun of us."
 mangrove.201.a: "This is not gonna look good."

 mangrove.202.t: "We rule"
 mangrove.202.d: "We're kinda awesome. We mog the other republics."
 mangrove.202.a: "Keep it up."

 mangrove.203.t: "We chronicle bad"
 mangrove.203.d: "We messed up while chronicling."
 mangrove.203.a: "Better luck next time."

 mangrove.204.t: "We chronicle good"
 mangrove.204.d: "The chronicle is looking good."
 mangrove.204.a: "Keep on chronicling."

# decisions
 mangrove_donate_reclamation_title: "Donate to the Reclamation Efforts"
 mangrove_donate_reclamation_desc: "The Republics have currently donated [mangrove_target_province.mangrove_donations.GetValue] time(s)."
 mangrove_donate_reclamation_trigger_tt: "The Reclamation is ongoing."
 mangrove_shift_focus_title: "Shift Focus"
 mangrove_shift_focus_desc: "We have no patience for this so-called Inward Focus. The Reclamation waits for no one!"
 mangrove_shift_focus_trigger_tt: "No other country has Shifted Focus yet"
 mangrove_shift_focus_tt: "Inward Focus ends soon."
 mangrove_construct_punia_logi_title: "Construct Punia Logi"
 mangrove_construct_punia_logi_desc: "Punia Logi are grand and beautiful constructions that require cooperation and strong foundations. They are symbols of permanent commitment and promise. Taga'alans exchange Punia Logi at weddings, diplomatic conferences, and other important occasions. However, the growing corruption within the Mangrove Republics did not leave the Punia Logi untouched. Institutional wealth corrupted the meritocratic process. More emphasis was placed on producing visually impressive pieces rather than functional ones. Judges were bribed. Now, we must discard the shackles of our past corruption in order to prove our dominance among the other republics."
 mangrove_punia_logi: "Punia Logi"
 mangrove_finished_bio_infra_tt: "We have a fully upgraded §YBiological Infrastructure§!."
 mangrove_display_influence_title: "Mangrove Influence"
 mangrove_display_influence_desc: "The Mangrove Republics do not fight wars of conquest or subjugation. The most influential Mangrove Republic leads the others."
 mangrove_display_influence_tt: "§YMangrove Influence§! can be changed by taking the §YDomination§! peace treaty (§G+5§!), events, chronicling, and donations made during the §YReclamation§! of the mangroves. It has a minimum of 0 and a maximum of 100. §YMangrove Influence§! directly affects §Yvoting power§!.\n§GDiplomatic Reputation§! also increases §Yvoting power§!, by an amount equal to §GDiplomatic Reputation multiplied by 4§!.\n\nCurrent Mangrove Leader: §G[mangrove_leader.GetName]§![P21.GetMangroveInfluence][P22.GetMangroveInfluence][P23.GetMangroveInfluence][P24.GetMangroveInfluence][P25.GetMangroveInfluence][P26.GetMangroveInfluence]"
