# province modifiers - specializations
 mangrove_bio_infra_adm_0: "Slothbelly Workshops"
 mangrove_bio_infra_adm_0_desc: "Mobile artisan towns built on the midriffs of hinui sloths who populate the hinuimangroves. We have trained the sloths to amble to the spots we are collecting resources from, whether that's for a woodcutting expedition, or salt harvesting from the leaves, or livestock transport efforts. They also happen to be pretty good swimmers."
 mangrove_bio_infra_adm_1: "Dolphin Docktowns"
 mangrove_bio_infra_adm_1_desc: "Dolphins are very intelligent creatures, and they understand market forces. In exchange for chasing fish into our nets, they receive a portion of the catch. If they aren't satisfied with the split of the catch, they don't help the fisherpeople the next day. Ports often have at least a few personnel whose sole job is to negotiate pay. The language barrier usually makes this a lengthy arbitration."
 mangrove_bio_infra_adm_2: "Mudskipper Muckers"
 mangrove_bio_infra_adm_2_desc: "While the hinuimudskipper fish are famous for their ability to breathe outside of the water and even climb trees, they also make impeccable mud excavators - each fish can move hundreds of pounds of mud with a single mouthful. They tirelessly maintain burrows, canals, and basements in the soggiest terrain of the rootballs. Whenever we build new towns or rebuild settlements lost to conflict or natural disaster, the mudskipper crews are the first on the scene to do foundational work for our buildings."
 mangrove_bio_infra_dip_0: "Mangrove Knee Kraken Baiters"
 mangrove_bio_infra_dip_0_desc: "Mangrove Knees are the unseen protectors of your coasts, but a capricious ally at best. Reinforcing the knees gives more surfaces to harvest and fish from and gives ships more surfaces to scuttle against. Young kraken are butchered here for their ink, which provides a powerful dye and obscuring reagent. The largest knees harbor teams of combat-ready prawn-riding sailors ready to engage with angry mother kraken."
 mangrove_bio_infra_dip_1: "Sport Prawn Breeding Pools"
 mangrove_bio_infra_dip_1_desc: "Large prawn breeding stock is hard to maintain outside of the perfect environments, and none take this more seriously than those breeding for race-prawns. Prawn breeding is highly competitive and traders will come from far to acquire good stock. The sport also serves as a soft-power backbone, with many diplomatic negotiations taking place before or after tourneys."
 mangrove_bio_infra_dip_2: "Hinuibromeliad Tad-Pools"
 mangrove_bio_infra_dip_2_desc: "High in the reaches of the hinuimangroves, you can find hinuibromeliads trapping water between the folds of their leaves. In these arboreal lakes, we raise the tadpoles of the rare hinuiflying-frog. While (in truth) the grown beasts only glide, they nonetheless offer unprecedented mobility for riders moving through the Insyaan landscape. When not in use for raising tadpoles, the pools are convenient freshwater storage sites for city consumption or fighting fires."
 mangrove_bio_infra_mil_0: "Hummingbird Rookeries"
 mangrove_bio_infra_mil_0_desc: "Hummingbird flocks pollinate our fields and ensure that our planting efforts will be as effective as possible, ensuring plenty of food for a healthy population. Additionally they serve as an excellent delivery system for recruitment initiatives."
 mangrove_bio_infra_mil_1: "Spine-Hive Fortneedles"
 mangrove_bio_infra_mil_1_desc: "The hinuimangroves have evolved hollowed spines for the housing of hinui-ants, who we employ in defense of our tree. In return, we help tend to their hinui-aphids and help harvest the protein wax nodules grown inside the thorns. The hinui-ants form a critical aspect of the defense of our lands by assisting with the protection of the tree trunks and deterring aerial threats."
 mangrove_bio_infra_mil_2: "Salt Rain Collection"
 mangrove_bio_infra_mil_2_desc: "Mangroves naturally expel the salt from the saline water they intake via their roots from their leaves. This means that our settlements are constantly pelted by the soft dropping of salt grains. Our settlements can put rain collectors on the sides of their homes to help acquire salt for food preservation uses, as well as for siege purposes; it's very hard to maintain agriculture when your fields are too saline to continue growing food. One of the reasons the hinuimangroves are so prevalent along the Taga'alan coast is their ability to salt their competition out of existence."

