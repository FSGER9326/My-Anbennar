name: Verne Automation Validation

on:
  push:
    branches: [main]
    paths:
      - ".gitattributes"
      - ".github/workflows/verne-validation.yml"
      - "automation/**"
      - "common/**"
      - "decisions/**"
      - "docs/**"
      - "events/**"
      - "localisation/**"
      - "missions/**"
      - "scripts/**"
  pull_request:
    branches: [main]
    paths:
      - ".gitattributes"
      - ".github/workflows/verne-validation.yml"
      - "automation/**"
      - "common/**"
      - "decisions/**"
      - "docs/**"
      - "events/**"
      - "localisation/**"
      - "missions/**"
      - "scripts/**"

jobs:
  validate-python-and-bash:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Compile Python scripts
        run: python -m py_compile scripts/*.py

      - name: Run Python automation checks
        run: |
          python scripts/docs_conflict_guard.py
          python scripts/checklist_link_audit.py
          python scripts/verne_checklist_audit.py
          python scripts/localisation_audit.py --file localisation/Flavour_Verne_A33_l_english.yml
          python scripts/event_id_audit.py --file events/Flavour_Verne_A33.txt
          python scripts/country_smoke_runner.py --profile automation/country_profiles/verne.json

      - name: Run Bash smoke checks
        run: bash scripts/verne_smoke_checks.sh

  validate-powershell:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run PowerShell smoke checks
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\verne_smoke_checks.ps1
