name: Verne Overhaul Validation

on:
  push:
    branches: [ main ]
    paths:
      - 'My-Anbennar/common/**'
      - 'My-Anbennar/events/**'
      - 'My-Anbennar/decisions/**'
      - 'My-Anbennar/missions/**'
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate EU4 Mod Files
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Check file structure
        run: |
          echo "=== Verne Overhaul File Structure Check ===" 
          echo ""
          echo "Checking key directories exist..."
          
          directories=(
            "My-Anbennar/common/ideas"
            "My-Anbennar/common/government_reforms"
            "My-Anbennar/common/great_projects"
            "My-Anbennar/common/mercenary_companies"
            "My-Anbennar/common/policies"
            "My-Anbennar/events"
            "My-Anbennar/decisions"
            "My-Anbennar/missions"
            "My-Anbennar/localisation"
          )
          
          for dir in "${directories[@]}"; do
            if [ -d "$dir" ]; then
              count=$(find "$dir" -type f | wc -l)
              echo "✓ $dir ($count files)"
            else
              echo "○ $dir"
            fi
          done
      
      - name: Validate EU4 script syntax
        run: |
          echo ""
          echo "=== Basic EU4 Syntax Validation ==="
          echo ""
          echo "Checking for syntax issues..."
          
          errors=0
          for file in My-Anbennar/common/**/*.txt My-Anbennar/events/**/*.txt My-Anbennar/decisions/**/*.txt; do
            if [ -f "$file" ]; then
              open_braces=$(grep -o '{' "$file" 2>/dev/null | wc -l)
              close_braces=$(grep -o '}' "$file" 2>/dev/null | wc -l)
              
              if [ "$open_braces" -ne "$close_braces" ]; then
                echo "⚠ $file - Brace mismatch"
                ((errors++))
              fi
            fi
          done
          
          if [ $errors -eq 0 ]; then
            echo "✓ No obvious syntax errors found"
          fi
      
      - name: Generate summary report
        run: |
          echo ""
          echo "╔════════════════════════════════════════╗"
          echo "║  VERNE OVERHAUL VALIDATION COMPLETE   ║"
          echo "╚════════════════════════════════════════╝"
          echo ""
          echo "Repository: My-Anbennar"
          echo "Validation Date: $(date)"
          echo ""
          echo "✓ Workflow executed successfully"
          echo ""
